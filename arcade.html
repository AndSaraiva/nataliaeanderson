    ctx.lineTo(x - 4, y - 28);
    ctx.closePath();
    ctx.fill();

    // Camisa branca
    ctx.fillStyle = '#FCF9F2';
    ctx.beginPath();
    ctx.moveTo(x - 2, y - 30);
    ctx.lineTo(x, y - 24);
    ctx.lineTo(x + 2, y - 30);
    ctx.closePath();
    ctx.fill();

    // Gravata dourada
    ctx.fillStyle = '#BFA15A';
    ctx.beginPath();
    ctx.moveTo(x - 1.5, y - 29);
    ctx.lineTo(x, y - 22);
    ctx.lineTo(x + 1.5, y - 29);
    ctx.closePath();
    ctx.fill();

    // Cabeça
    ctx.fillStyle = '#F5DDC0';
    ctx.beginPath();
    ctx.arc(x, y - 35, 5, 0, Math.PI * 2);
    ctx.fill();

    // Cabelo
    ctx.fillStyle = '#3E2A1A';
    ctx.beginPath();
    ctx.arc(x, y - 38, 5, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(x - 5, y - 38, 10, 2);

    // Braços
    ctx.fillStyle = '#2B2B22';
    ctx.fillRect(x - 12, y - 28, 3, 10);
    ctx.fillRect(x + 9, y - 28, 3, 10);
    // Mãos
    ctx.fillStyle = '#F5DDC0';
    ctx.beginPath();
    ctx.arc(x - 10, y - 17, 2, 0, Math.PI * 2);
    ctx.arc(x + 10, y - 17, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // === OBSTÁCULOS DESENHADOS ===
  function desenharCano(a) {
    const x = a.x, y = CHAO_Y, h = a.altura, w = a.larg;
    // Base do arco de flores
    ctx.fillStyle = '#7C8F4B';
    ctx.fillRect(x, y - h, w, h);
    // Flores
    const florCor = ['#D9A5A5', '#FCF9F2', '#BFA15A', '#E4C767'];
    for (let i = 0; i < 5; i++) {
      const fx = x + (w / 5) * i + 3;
      const fy = y - h + 5 + (i % 2) * 6;
      ctx.fillStyle = florCor[i % florCor.length];
      ctx.beginPath();
      ctx.arc(fx, fy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // Borda dourada no topo
    ctx.fillStyle = '#BFA15A';
    ctx.fillRect(x - 1, y - h, w + 2, 2);
  }

  // Taça de champanhe derramada (convidado esbarrou)
  function desenharTaca(a) {
    const x = a.x, y = CHAO_Y, w = a.larg;
    // Poça derramada no chão
    ctx.fillStyle = 'rgba(229,199,103,0.55)';
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y - 1, w / 2 + 2, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Haste
    ctx.strokeStyle = '#BFA15A';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y - 3);
    ctx.lineTo(x + w / 2, y - 14);
    ctx.stroke();
    // Base
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y - 2, 5, 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#BFA15A';
    ctx.fill();
    // Copo (taça virada um pouco)
    ctx.fillStyle = 'rgba(229,199,103,0.85)';
    ctx.beginPath();
    ctx.ellipse(x + w / 2 + 5, y - 18, 7, 9, -0.4, 0, Math.PI * 2);
    ctx.fill();
    // Brilho
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(x + w / 2 + 3, y - 21, 2, 4, -0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Buquê caído no chão
  function desenharBuque(a) {
    const x = a.x, y = CHAO_Y, w = a.larg;
    // Fitas
    ctx.strokeStyle = '#E4C767';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y - 2);
    ctx.quadraticCurveTo(x + w / 2 - 6, y - 6, x + w / 2 - 4, y - 12);
    ctx.moveTo(x + w / 2, y - 2);
    ctx.quadraticCurveTo(x + w / 2 + 6, y - 6, x + w / 2 + 4, y - 12);
    ctx.stroke();
    // Caule
    ctx.strokeStyle = '#556B2F';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y - 2);
    ctx.lineTo(x + w / 2, y - 12);
    ctx.stroke();
    // Flores (cacho)
    const cores = ['#D9A5A5', '#FCF9F2', '#E4C767', '#D9A5A5'];
    for (let i = 0; i < 4; i++) {
      const fx = x + w / 2 - 6 + i * 4;
      const fy = y - 14 - (i % 2) * 2;
      ctx.fillStyle = cores[i];
      ctx.beginPath();
      ctx.arc(fx, fy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#BFA15A';
    ctx.beginPath();
    ctx.arc(x + w / 2, y - 14, 1.6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Fotógrafo atravessando com a câmera
  // Taça de vinho caída no chão (objeto decorativo)
  function desenharTaçaVinho(a) {
    const x = a.x, y = CHAO_Y, w = a.larg;
    const cx = x + w / 2;
    // Sombra/poça de vinho derramado
    ctx.fillStyle = 'rgba(120,30,40,0.4)';
    ctx.beginPath();
    ctx.ellipse(cx + 3, y - 1, w / 2 + 2, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Base da taça
    ctx.fillStyle = '#BFA15A';
    ctx.beginPath();
    ctx.ellipse(cx, y - 2, 6, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Haste
    ctx.strokeStyle = '#BFA15A';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, y - 3);
    ctx.lineTo(cx - 4, y - 16);
    ctx.stroke();
    // Copo (virado)
    ctx.fillStyle = 'rgba(250,246,238,0.85)';
    ctx.beginPath();
    ctx.ellipse(cx - 7, y - 20, 8, 10, 0.4, 0, Math.PI * 2);
    ctx.fill();
    // Vinhorestante (líquido escuro)
    ctx.fillStyle = '#6E1F2A';
    ctx.beginPath();
    ctx.ellipse(cx - 9, y - 24, 4, 5, 0.4, 0, Math.PI * 2);
    ctx.fill();
    // Brilho do vidro
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.ellipse(cx - 4, y - 23, 1.6, 4, 0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Vela acesa no chão (decoração vira obstáculo)
  function desenharVela(a) {
    const x = a.x, y = CHAO_Y, w = a.larg;
    // Pratinho
    ctx.fillStyle = '#BFA15A';
    ctx.beginPath();
    ctx.ellipse(x + w / 2, y - 1, w / 2, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Vela
    ctx.fillStyle = '#FCF9F2';
    ctx.fillRect(x + w / 2 - 3, y - 16, 6, 15);
    // Pavio
    ctx.strokeStyle = '#3E2A1A';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y - 16);
    ctx.lineTo(x + w / 2, y - 19);
    ctx.stroke();
    // Chama
    const flick = Math.sin(frame * 0.3) * 1;
    ctx.fillStyle = '#E4C767';
    ctx.beginPath();
    ctx.ellipse(x + w / 2 + flick * 0.5, y - 22, 2.2, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#BFA15A';
    ctx.beginPath();
    ctx.ellipse(x + w / 2 + flick * 0.5, y - 21, 1, 2.4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function desenharVaso(a) {
    const x = a.x, y = CHAO_Y;
    // Vaso
    ctx.fillStyle = '#5C3A22';
    ctx.beginPath();
    ctx.moveTo(x, y - 14);
    ctx.lineTo(x + 2, y);
    ctx.lineTo(x + 14, y);
    ctx.lineTo(x + 16, y - 14);
    ctx.closePath();
    ctx.fill();
    // Borda
    ctx.fillStyle = '#BFA15A';
    ctx.fillRect(x - 1, y - 15, 18, 2);
    // Flores
    const cores = ['#D9A5A5', '#FCF9F2', '#BFA15A'];
    for (let i = 0; i < 3; i++) {
      const fx = x + 3 + i * 5;
      const fy = y - 18 - (i % 2) * 3;
      ctx.fillStyle = cores[i];
      ctx.beginPath();
      ctx.arc(fx, fy, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    // Folhas
    ctx.fillStyle = '#556B2F';
    ctx.beginPath();
    ctx.ellipse(x + 8, y - 20, 6, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function desenharObstaculo(o) {
    if (o.tipo === 'arco') desenharCano(o);
    else if (o.tipo === 'taca') desenharTaca(o);
    else if (o.tipo === 'buque') desenharBuque(o);
    else if (o.tipo === 'vinho') desenharTaçaVinho(o);
    else if (o.tipo === 'vela') desenharVela(o);
    else if (o.tipo === 'vaso') desenharVaso(o);
  }

  // === PARTÍCULAS (poeira) ===
  function emitirPoeira() {
    if (pers.noChao && frame % 3 === 0) {
      particulas.push({
        x: pers.x - 10 + Math.random() * 4,
        y: CHAO_Y - 1,
        vx: -velocidade * 0.4 + (Math.random() - 0.5) * 0.5,
        vy: -0.3 - Math.random() * 0.4,
        r: 1 + Math.random() * 1.5,
        alpha: 0.6,
        vida: 20
      });
    }
  }

  function desenharParticulas() {
    particulas.forEach(p => {
      ctx.fillStyle = `rgba(124,143,75,${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  // === HUD ===
  function desenharHUD() {
    if (iniciou && !gameOver) {
      // Distância grande
      ctx.fillStyle = '#FFFFFF';
      ctx.strokeStyle = 'rgba(43,43,34,0.5)';
      ctx.lineWidth = 4;
      ctx.font = 'bold 28px "Fraunces", serif';
      ctx.textAlign = 'center';
      ctx.strokeText(distancia + 'm', W / 2, 40);
      ctx.fillText(distancia + 'm', W / 2, 40);

      // Velocidade (indicador sutil)
      ctx.fillStyle = 'rgba(43,43,34,0.4)';
      ctx.font = '11px "Jost", sans-serif';
      ctx.fillText(Math.floor(velocidade * 30) + ' km/h', W / 2, 56);
      ctx.textAlign = 'left';
    }

    // Linhas de velocidade (motion blur sutil nas bordas)
    if (iniciou && !gameOver && velocidade > 5) {
      const opacidade = Math.min(0.3, (velocidade - 5) * 0.1);
      ctx.strokeStyle = `rgba(255,255,255,${opacidade})`;
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const y = 20 + i * 30;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W * 0.15, y);
        ctx.moveTo(W, y);
        ctx.lineTo(W * 0.85, y);
        ctx.stroke();
      }
    }

    // Game over
    if (gameOver) {
      ctx.fillStyle = 'rgba(43,43,34,0.7)';
      ctx.fillRect(0, 0, W, H);

      // Card central
      const cardW = 200, cardH = 120;
      const cardX = (W - cardW) / 2, cardY = (H - cardH) / 2;
      ctx.fillStyle = 'rgba(250,246,238,0.96)';
      ctx.beginPath();
      const r = 16;
      ctx.moveTo(cardX + r, cardY);
      ctx.arcTo(cardX + cardW, cardY, cardX + cardW, cardY + cardH, r);
      ctx.arcTo(cardX + cardW, cardY + cardH, cardX, cardY + cardH, r);
      ctx.arcTo(cardX, cardY + cardH, cardX, cardY, r);
      ctx.arcTo(cardX, cardY, cardX + cardW, cardY, r);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#7A4F30';
      ctx.font = '500 12px "Jost", sans-serif';
      ctx.textAlign = 'center';
      if (foiRecorde) {
        ctx.fillStyle = '#BFA15A';
        ctx.fillText('🎉 NOVO RECORDE DA ' + rotuloPersonagem.toUpperCase() + '!', W / 2, cardY + 30);
      } else {
        ctx.fillStyle = '#7A4F30';
        ctx.fillText('💔 A ' + rotuloPersonagem.toLowerCase() + ' tropeçou!', W / 2, cardY + 30);
      }

      ctx.fillStyle = '#2E3A18';
      ctx.font = '500 28px "Fraunces", serif';
      ctx.fillText(distancia + 'm', W / 2, cardY + 62);

      ctx.fillStyle = '#5C5C4E';
      ctx.font = '13px "Jost", sans-serif';
      ctx.fillText('Recorde da ' + rotuloPersonagem.toLowerCase() + ': ' + recorde + 'm', W / 2, cardY + 85);

      ctx.fillStyle = '#BFA15A';
      ctx.font = '12px "Jost", sans-serif';
      ctx.fillText('Toque para reiniciar', W / 2, cardY + 105);
      ctx.textAlign = 'left';
    }
  }

  // === DESENHO PRINCIPAL ===
  function desenhar(offsetX, offsetY) {
    ctx.save();
    if (offsetX || offsetY) ctx.translate(offsetX, offsetY);

    ctx.clearRect(-10, -10, W + 20, H + 20);
    desenharCeu();
    desenharSol();
    desenharConfetes();
    desenharPassaros();
    desenharSerra();
    desenharFlores();
    desenharChao();
    desenharAltar();
    obstaculos.forEach(desenharObstaculo);
    desenharParticulas();
    // Confete de comemoração (burst)
    confeteFesta.forEach(c => {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rot);
      ctx.globalAlpha = Math.max(0, Math.min(1, c.vida / 60));
      ctx.fillStyle = c.cor;
      ctx.fillRect(-c.r / 2, -c.r, c.r, c.r * 2);
      ctx.restore();
    });
    ctx.globalAlpha = 1;

    // Personagem (noiva ou noivo)
    const persY = pers.y;
    if (tipoPersonagem === 1) {
      desenharNoiva(pers.x, persY, pers.frame);
    } else {
      desenharNoivo(pers.x, persY, pers.frame);
    }

    desenharHUD();
    ctx.restore();
  }

  // === LÓGICA ===
  function pular() {
    if (gameOver) {
      reiniciar();
      return;
    }
    if (pers.noChao) {
      pers.vy = FORCA_PULO;
      pers.noChao = false;
      if (!iniciou) {
        iniciou = true;
        if (tapHintEl) tapHintEl.style.opacity = '0';
        if (dicaEl) dicaEl.style.opacity = '0.5';
      }
      // Partículas de decolagem
      for (let i = 0; i < 4; i++) {
        particulas.push({
          x: pers.x - 5,
          y: CHAO_Y - 1,
          vx: -velocidade * 0.3 + (Math.random() - 0.5),
          vy: 0.5 + Math.random() * 0.5,
          r: 1.5 + Math.random(),
          alpha: 0.7,
          vida: 15
        });
      }
    }
  }

  function fimDeJogo() {
    if (gameOver) return;
    gameOver = true;
    shake = 6;
    if (vezEl) vezEl.style.opacity = '0';
    if (barraEl) barraEl.style.width = '0%';
    if (distancia > recorde) {
      recorde = distancia;
      foiRecorde = true;
      recordesPlanilha['Corrida até o Altar'] = recorde;
      recordeEl.textContent = recorde;
      // Confete de comemoração!
      const cores = ['#D9A5A5', '#E4C767', '#BFA15A', '#FCF9F2', '#C97B7B', '#7C8F4B'];
      for (let i = 0; i < 90; i++) {
        confeteFesta.push({
          x: Math.random() * W,
          y: -Math.random() * H * 0.6,
          vx: (Math.random() - 0.5) * 2.2,
          vy: 1.5 + Math.random() * 3,
          r: 2.5 + Math.random() * 3,
          cor: cores[Math.floor(Math.random() * cores.length)],
          rot: Math.random() * Math.PI,
          vr: (Math.random() - 0.5) * 0.3,
          vida: 160 + Math.random() * 60
        });
      }
    }
    // Grava a pontuação (distância) na planilha de ranking
    finalizarJogo('Corrida até o Altar', distancia);
  }

  function reiniciar() {
    // A cada derrota/reinício, alterna entre noivo e noiva
    ultimoPersonagemCorrida = 1 - ultimoPersonagemCorrida;
    tipoPersonagem = ultimoPersonagemCorrida;
    atualizarPersonagem();

    pers = { x: PERS_X, y: CHAO_Y, vy: 0, noChao: true, frame: 0 };
    obstaculos = [];
    particulas = [];
    confeteFesta = [];
    distancia = 0;
    gameOver = false;
    foiRecorde = false;
    iniciou = false;
    velocidade = VEL_BASE;
    frame = 0;
    shake = 0;
    obstDistancia = 0;
    altar = { x: W + 50, escala: 0.5 };
    pontosEl.textContent = 0;
    if (vezEl) vezEl.style.opacity = '1';
    if (barraEl) barraEl.style.width = '0%';
    if (tapHintEl) tapHintEl.style.opacity = '1';
    if (dicaEl) dicaEl.style.opacity = '1';
  }

  function criarObstaculo() {
    const tipos = ['arco', 'taca', 'buque', 'vinho', 'vela', 'vaso'];
    const tipo = tipos[Math.floor(Math.random() * tipos.length)];
    let larg, altura;
    if (tipo === 'arco') { larg = 24; altura = 36; }
    else if (tipo === 'taca') { larg = 22; altura = 20; }
    else if (tipo === 'buque') { larg = 22; altura = 16; }
    else if (tipo === 'vinho') { larg = 34; altura = 30; }
    else if (tipo === 'vela') { larg = 18; altura = 24; }
    else { larg = 18; altura = 22; }
    obstaculos.push({ x: W + 30, tipo, larg, altura });
  }

  function loop() {
    // Game over: continua animando partículas e tremor
    if (gameOver) {
      if (shake > 0) { shake *= 0.85; if (shake < 0.3) shake = 0; }
      particulas.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vida--; p.alpha = p.vida / 20;
      });
      particulas = particulas.filter(p => p.vida > 0);
      const offX = shake ? (Math.random() - 0.5) * shake : 0;
      const offY = shake ? (Math.random() - 0.5) * shake : 0;
      desenhar(offX, offY);
      loopId = requestAnimationFrame(loop);
      return;
    }

    frame++;

    // Física do personagem
    pers.vy += GRAVIDADE;
    if (pers.vy > 14) pers.vy = 14;
    pers.y += pers.vy;
    if (pers.y >= CHAO_Y) {
      pers.y = CHAO_Y;
      pers.vy = 0;
      if (!pers.noChao) {
        // Pousou — pequena poeira
        for (let i = 0; i < 3; i++) {
          particulas.push({
            x: pers.x - 5 + Math.random() * 4,
            y: CHAO_Y - 1,
            vx: -velocidade * 0.3,
            vy: -0.5 - Math.random() * 0.5,
            r: 1.5,
            alpha: 0.7,
            vida: 18
          });
        }
      }
      pers.noChao = true;
    }

    // Animação de "passo" quando está no chão
    if (pers.noChao && iniciou) {
      pers.frame = Math.floor(frame / 6) % 4;
    } else {
      pers.frame = 0;
    }

    // Move cenário
    passaros.forEach(p => {
      p.x -= p.vel;
      p.frame++;
      if (p.x < -20) { p.x = W + 20; p.y = 30 + Math.random() * 50; }
    });
    confetes.forEach(c => {
      c.y += c.vel;
      c.rot += c.rotVel;
      if (c.y > CHAO_Y) { c.y = -10; c.x = Math.random() * W; }
    });
    // Confete de comemoração (burst) — cai e some
    for (let i = confeteFesta.length - 1; i >= 0; i--) {
      const c = confeteFesta[i];
      c.vy += 0.06;
      c.x += c.vx;
      c.y += c.vy;
      c.rot += c.vr;
      c.vida--;
      if (c.vida <= 0 || c.y > H + 20) confeteFesta.splice(i, 1);
    }
    if (iniciou) {
      flores.forEach(f => { f.x -= velocidade * 0.5; });
      if (flores[0] && flores[0].x < -20) {
        flores.shift();
        flores.push({ x: flores[flores.length - 1].x + 40 + Math.random() * 20, tipo: Math.floor(Math.random() * 3) });
      }
      gramaDetalhes.forEach(g => { g.x -= velocidade; });
      gramaDetalhes.forEach(g => {
        if (g.x < -10) g.x = W + Math.random() * 10;
      });

      // Aceleração progressiva (só depois do aquecimento)
      if (velocidade < VEL_MAX && distancia > VEL_AQUECIMENTO) {
        velocidade += VEL_INC;
      }

      // Spawn de obstáculos com distância mínima generosa
      obstDistancia += velocidade;
      if (obstDistancia > DIST_MIN_OBST + Math.random() * DIST_VARIACAO) {
        criarObstaculo();
        obstDistancia = 0;
      }

      // Move obstáculos
      obstaculos.forEach(o => { o.x -= velocidade; });
      obstaculos = obstaculos.filter(o => o.x > -50);

      // Distância
      distancia = Math.floor(frame * velocidade * 0.6);
      pontosEl.textContent = distancia;

      // Barra de progresso até o altar
      const METAS = [100, 300, 600, 1000, 1500, 2200, 3000];
      let pct = 0;
      const ultima = METAS[METAS.length - 1];
      if (distancia >= ultima) {
        pct = 100;
      } else {
        for (let m = 0; m < METAS.length; m++) {
          const inicio = m === 0 ? 0 : METAS[m - 1];
          if (distancia < METAS[m]) {
            pct = (m / METAS.length + (distancia - inicio) / (METAS[m] - inicio) / METAS.length) * 100;
            break;
          }
        }
      }
      if (barraEl) barraEl.style.width = Math.min(100, Math.max(0, pct)) + '%';

      // Altar se aproximando (efeito motivacional)
      altar.x -= velocidade * 0.4;
      altar.escala = Math.min(1.2, 0.5 + distancia / 800);
      if (altar.x < -40) {
        altar.x = W + 100 + Math.random() * 200;
        altar.escala = 0.5;
      }
    }

    // Poeira dos pés
    emitirPoeira();

    // Partículas
    particulas.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vida--; p.alpha = Math.max(0, p.vida / 20);
    });
    particulas = particulas.filter(p => p.vida > 0);

    // Decai shake
    if (shake > 0) { shake *= 0.85; if (shake < 0.3) shake = 0; }

    // === COLISÃO AABB ===
    if (iniciou) {
      const persBox = { x: pers.x - HITBOX_LARG / 2, y: pers.y - HITBOX_ALTURA, w: HITBOX_LARG, h: HITBOX_ALTURA };
      for (const o of obstaculos) {
        const oBox = { x: o.x, y: CHAO_Y - o.altura, w: o.larg, h: o.altura };
        if (persBox.x < oBox.x + oBox.w && persBox.x + persBox.w > oBox.x &&
            persBox.y < oBox.y + oBox.h && persBox.y + persBox.h > oBox.y) {
          fimDeJogo();
          break;
        }
      }
    }

    const offX = shake ? (Math.random() - 0.5) * shake : 0;
    const offY = shake ? (Math.random() - 0.5) * shake : 0;
    desenhar(offX, offY);
    loopId = requestAnimationFrame(loop);
  }

  // === CONTROLES ===
  function aoTeclar(e) {
    if (e.code === 'Space') { e.preventDefault(); pular(); }
  }
  function aoClicar(e) {
    e.preventDefault();
    pular();
  }

  canvas.addEventListener('mousedown', aoClicar);
  canvas.addEventListener('touchstart', aoClicar, { passive: false });
  document.addEventListener('keydown', aoTeclar);

  // Cleanup ao sair do jogo
  const observerSair = new MutationObserver(() => {
    if (container.querySelector('#corridaCanvas') !== canvas) {
      document.removeEventListener('keydown', aoTeclar);
      if (loopId) cancelAnimationFrame(loopId);
      observerSair.disconnect();
    }
  });
  observerSair.observe(container, { childList: true, subtree: true });

  // Botão "jogar de novo" (fica escondido até game over)
  const fimEl = container.querySelector('#corridaFim');
  fimEl.innerHTML = `<button class="btn-jogar btn-magnetic btn-magnetic--fill" id="corridaJogarDeNovo" data-magnetic style="display:none;"><span>🔁 Correr de novo</span></button>`;
  fimEl.querySelector('#corridaJogarDeNovo').addEventListener('click', () => {
    reiniciar();
  });

  // Desenho inicial
  desenhar(0, 0);
  loopId = requestAnimationFrame(loop);
}

// JOGO 5 — QUEBRA-CABEÇA (usa as mesmas fotos do Jogo da Memória)
// ===================================================================
function iniciarJogoQuebraCabeca(container) {
  tocarMusicaJogo(container, './quebra.mp3');
  const LINHAS = 4, COLUNAS = 4;
  const fotos = [
    './foto2.jpeg',
    './foto3.jpeg',
    './foto4.jpeg',
    './foto5.jpeg',
    './foto6.jpeg',
  ];
  const foto = fotos[Math.floor(Math.random() * fotos.length)];

  // Cada peça tem uma posição-alvo (row, col). O tabuleiro é o destino; a bancada mostra as peças embaralhadas.
  const pecas = [];
  for (let r = 0; r < LINHAS; r++) {
    for (let c = 0; c < COLUNAS; c++) {
      pecas.push({ id: r * COLUNAS + c, r, c, colocada: false });
    }
  }
  // Embaralha a ORDEM em que aparecem na bancada (não muda r/c, que é a posição-alvo)
  const ordemBancada = embaralhar(pecas.map(p => p.id));

  let pecasColocadas = 0;
  let pecaSelecionada = null; // id da peça atualmente selecionada
  const inicio = Date.now();
  let timerInt = null;

  container.innerHTML = `
    <div class="jogo-cabecalho">
      <h2>🧩 Quebra-Cabeça</h2>
      <div class="jogo-stats">
        <span>Peças: <b id="quebraColocadas">0</b>/${pecas.length}</span>
        <span>Tempo: <b id="quebraTempo">0s</b></span>
        <span>Recorde: <b>${recordesPlanilha['Quebra-Cabeça'] != null ? recordesPlanilha['Quebra-Cabeça'] : '—'}</b></span>
      </div>
    </div>
    <p class="quebra-dica" id="quebraDica">Toque numa peça da bancada abaixo — ela vai destacar em dourado. Depois toque no quadradinho certo do tabuleiro.</p>
    <div class="quebra-tabuleiro" id="quebraTabuleiro"></div>
    <div class="quebra-bancada" id="quebraBancada"></div>
    <div id="quebraFim" class="flap-fim"></div>
  `;

  const tabuleiroEl = container.querySelector('#quebraTabuleiro');
  const bancadaEl = container.querySelector('#quebraBancada');
  const colocadasEl = container.querySelector('#quebraColocadas');
  const tempoEl = container.querySelector('#quebraTempo');
  const dicaEl = container.querySelector('#quebraDica');

  function corFundoPeca(p) {
    return `${(p.c / (COLUNAS - 1)) * 100}% ${(p.r / (LINHAS - 1)) * 100}%`;
  }

  // Cria os 16 slots do tabuleiro
  for (let r = 0; r < LINHAS; r++) {
    for (let c = 0; c < COLUNAS; c++) {
      const slot = document.createElement('div');
      slot.className = 'quebra-slot quebra-slot-tab';
      slot.dataset.r = r;
      slot.dataset.c = c;
      // Click e touchstart (comunica antes do zoom do iOS)
      const handler = (ev) => { ev.preventDefault(); tentarEncaixar(r, c); };
      slot.addEventListener('click', handler);
      slot.addEventListener('touchend', handler, { passive: false });
      tabuleiroEl.appendChild(slot);
    }
  }

  function renderBancada() {
    bancadaEl.innerHTML = '';
    ordemBancada.forEach(id => {
      const p = pecas.find(x => x.id === id);
      if (p.colocada) return; // não mostra peças já posicionadas
      const slot = document.createElement('div');
      slot.className = 'quebra-slot quebra-slot-banc';
      slot.dataset.id = p.id;
      if (pecaSelecionada === p.id) slot.classList.add('selecionada');
      slot.innerHTML = `<div class="peca-inner" style="background-image:url('${foto}'); background-position:${corFundoPeca(p)};"></div>`;
      const handler = (ev) => { ev.preventDefault(); selecionarPeca(p.id); };
      slot.addEventListener('click', handler);
      slot.addEventListener('touchend', handler, { passive: false });
      bancadaEl.appendChild(slot);
    });
    // Se a peça selecionada foi colocada, limpa a seleção
    if (pecaSelecionada != null && pecas.find(x => x.id === pecaSelecionada)?.colocada) {
      pecaSelecionada = null;
    }
  }

  function selecionarPeca(id) {
    const p = pecas.find(x => x.id === id);
    if (!p || p.colocada) return;
    pecaSelecionada = (pecaSelecionada === id) ? null : id;
    renderBancada();
    atualizarDica();
  }

  function tentarEncaixar(r, c) {
    if (pecaSelecionada == null) {
      // Sem peça selecionada: pisca o tabuleiro inteiro pra indicar
      tabuleiroEl.classList.add('tab-pedindo');
      setTimeout(() => tabuleiroEl.classList.remove('tab-pedindo'), 250);
      return;
    }
    if (!timerInt) timerInt = setInterval(atualizarTempo, 1000);

    const p = pecas.find(x => x.id === pecaSelecionada);
    const slot = tabuleiroEl.querySelector(`.quebra-slot-tab[data-r="${r}"][data-c="${c}"]`);

    if (p.r === r && p.c === c) {
      // Acerto
      slot.innerHTML = `<div class="peca-inner" style="background-image:url('${foto}'); background-position:${corFundoPeca(p)};"></div>`;
      slot.classList.add('correta');
      p.colocada = true;
      pecasColocadas++;
      colocadasEl.textContent = pecasColocadas;
      pecaSelecionada = null;
      renderBancada();
      atualizarDica();
      tabuleiroEl.querySelectorAll('.quebra-slot-tab').forEach(el => el.classList.remove('hover'));

      if (pecasColocadas === pecas.length) {
        clearInterval(timerInt);
        setTimeout(finalizar, 350);
      }
    } else {
      // Erro: pisca o slot errado em vermelho rápido
      slot.classList.add('errado');
      setTimeout(() => slot.classList.remove('errado'), 350);
    }
  }

  function atualizarTempo() {
    tempoEl.textContent = Math.floor((Date.now() - inicio) / 1000) + 's';
  }

  function atualizarDica() {
    if (pecaSelecionada == null) {
      dicaEl.textContent = 'Toque numa peça da bancada abaixo — ela vai destacar em dourado. Depois toque no quadradinho certo do tabuleiro.';
    } else {
      const p = pecas.find(x => x.id === pecaSelecionada);
      dicaEl.textContent = `Peça selecionada: linha ${p.r + 1}, coluna ${p.c + 1}. Toque no tabuleiro para encaixar (ou toque na peça de novo para desselecionar).`;
    }
  }

  function finalizar() {
    const segundos = Math.floor((Date.now() - inicio) / 1000);
    const pontos = Math.max(80, 1000 - segundos * 15 + pecas.length * 5);
    const mensagem = pontos >= 800
      ? 'Montou tudo rapidinho! 🧩💛'
      : 'Foto do casal completinha! ✨';
    container.innerHTML = `
      <div class="jogo-final">
        <h2>${mensagem}</h2>
        <p>Tempo: <b>${segundos}s</b><br>Pontuação: <b>${pontos}</b></p>
        <div style="margin:14px auto 0; width:min(280px,100%); aspect-ratio:1; border-radius:14px; overflow:hidden; border:1px solid var(--linha); background-color:var(--oliva-claro); background-image:url('${foto}'); background-size:cover; background-position:center;"></div>
      </div>
      <div class="flap-fim">
        <button class="btn-jogar btn-magnetic btn-magnetic--fill" id="quebraJogarDeNovo" data-magnetic><span>🔁 Jogar novamente</span></button>
      </div>`;
    finalizarJogo('Quebra-Cabeça', pontos);
    container.querySelector('#quebraJogarDeNovo').addEventListener('click', () => iniciarJogoQuebraCabeca(container));
  }

  renderBancada();
  atualizarDica();
}

// JOGO 6 — EMPILHE OS PRESENTES (modernizado)
// ===================================================================
function iniciarJogoPresentes(container) {
  tocarMusicaJogo(container, './presentes.mp3');
  container.innerHTML = `
    <div class="jogo-cabecalho">
      <h2>🎁 Empilhe os Presentes</h2>
      <div class="jogo-stats">
        <span>Andar: <b id="presAndar">0</b></span>
        <span>Pontos: <b id="presPontos">0</b></span>
        <span>❤️ <b id="presVidas">3</b></span>
        <span>Recorde: <b id="presRecorde">${recordesPlanilha['Empilhe os Presentes'] != null ? recordesPlanilha['Empilhe os Presentes'] : '—'}</b></span>
      </div>
    </div>
    <canvas id="presCanvas" width="340" height="480"></canvas>
    <p class="flap-dica">Toque na tela (ou aperte espaço) para soltar a caixa no momento certo.<br>Encaixe perfeito vale bônus! 🎯</p>
    <div id="presFim" class="flap-fim"></div>
  `;
  const canvas = container.querySelector('#presCanvas');
  const ctx = canvas.getContext('2d');
  const andarEl = container.querySelector('#presAndar');
  const pontosEl = container.querySelector('#presPontos');
  const vidasEl = container.querySelector('#presVidas');
  const W = canvas.width, H = canvas.height;

  const profundidade = 12;    // "extrusão" 3D (topo + lateral)
  const alturaCaixa = 30;
  const PERFEITO_TOL = 6;     // tolerância (px) do encaixe perfeito
  const PONTOS_ANDAR = 100;
  const BONUS_PERFEITO = 50;
  // paleta casamento (verde oliva, dourado, terracota, sage, bronze)
  const coresCaixa = ['#556B2F', '#BFA15A', '#7A4F30', '#7C8F4B', '#9C6B3F', '#C9A86A'];

  let pilha, atual, rolagem, andares, pontos, vidas, rodando, idAnimacao;
  let flash = 0;
  let tremer = 0;
  let partes = [];            // partículas de "pozinho" ao encaixar

  // ---- helpers de cor ----
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function hexToRgb(h) {
    h = h.replace('#', '');
    return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
  }
  function shade(hex, f) {
    const [r, g, b] = hexToRgb(hex);
    const m = (c) => clamp(Math.round(c * f), 0, 255);
    return `rgb(${m(r)},${m(g)},${m(b)})`;
  }

  function reset() {
    pilha = [{ x: W / 2 - 70, largura: 140, cor: coresCaixa[0] }];
    atual = null;
    rolagem = 0;
    andares = 0;
    pontos = 0;
    vidas = 3;
    rodando = true;
    flash = 0;
    tremer = 0;
    partes = [];
    andarEl.textContent = '0';
    pontosEl.textContent = '0';
    vidasEl.textContent = '3';
    novaCaixa();
  }

  function novaCaixa() {
    const ultima = pilha[pilha.length - 1];
    const posTopo = H - (pilha.length + 1) * alturaCaixa - profundidade + rolagem;
    atual = {
      largura: ultima.largura,
      cor: coresCaixa[pilha.length % coresCaixa.length],
      x: 0, dir: 1,
      vel: 2.2 + pilha.length * 0.16,
      y: -alturaCaixa,             // começa acima da tela
      caindo: false,
      vy: 0,
    };
  }

  // desenha uma CAIXA DE PRESENTE 3D (tampa com abas, fita cruzada e laço)
  function desenharCaixa(x, y, larg, cor, alpha) {
    const h = alturaCaixa;
    ctx.save();
    ctx.globalAlpha = alpha == null ? 1 : alpha;

    const fita = '#D33A2C';      // vermelho presente
    const fitaEsc = '#A5281C';   // vermelho escuro
    const faixa = Math.max(7, larg * 0.16);
    const arred = 5;

    // ---- sombra suave projetada PARA BAIXO (dentro da largura, sem estender pros lados) ----
    const sg = ctx.createLinearGradient(0, y + h, 0, y + h + 7);
    sg.addColorStop(0, 'rgba(40,30,15,0.22)');
    sg.addColorStop(1, 'rgba(40,30,15,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(x + 2, y + h, larg - 4, 7);

    // ---- corpo da caixa (retângulo arredondado, gradiente de luz = profundidade) ----
    const g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, shade(cor, 1.12));   // mais claro no topo
    g.addColorStop(0.5, cor);
    g.addColorStop(1, shade(cor, 0.78));   // mais escuro embaixo
    ctx.fillStyle = g;
    if (typeof ctx.roundRect === 'function') {
      ctx.beginPath(); ctx.roundRect(x, y, larg, h, arred); ctx.fill();
    } else {
      ctx.fillRect(x, y, larg, h);
    }

    // ---- fita vertical (frente) ----
    ctx.fillStyle = fita;
    ctx.fillRect(x + larg / 2 - faixa / 2, y, faixa, h);
    ctx.fillStyle = fitaEsc;               // vermelho mais fechado como centro da fita
    ctx.fillRect(x + larg / 2 - faixa / 2, y, Math.max(1.5, faixa * 0.16), h);

    // ---- LAÇO vermelho no topo (centralizado, sem estender a caixa) ----
    const cx = x + larg / 2;
    const cy = y - 3;                      // nó rente ao topo da caixa
    ctx.strokeStyle = fitaEsc;
    ctx.lineWidth = 1;
    // fitas caídas dos lados (para dentro da largura)
    const a = Math.min(10, larg * 0.16);
    ctx.fillStyle = fita;
    ctx.beginPath();
    ctx.moveTo(cx - 2, cy);
    ctx.quadraticCurveTo(cx - a - 3, cy + 2, cx - a, cy + 8);
    ctx.lineTo(cx - a + 5, cy + 6);
    ctx.quadraticCurveTo(cx - 4, cy + 1, cx - 2, cy);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx + 2, cy);
    ctx.quadraticCurveTo(cx + a + 3, cy + 2, cx + a, cy + 8);
    ctx.lineTo(cx + a - 5, cy + 6);
    ctx.quadraticCurveTo(cx + 4, cy + 1, cx + 2, cy);
    ctx.closePath(); ctx.fill();
    // duas orelhas do laço
    ctx.beginPath();
    ctx.ellipse(cx - 5, cy - 4, 4, 6, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 5, cy - 4, 4, 6, 0.5, 0, Math.PI * 2);
    ctx.fill();
    // centro do nó
    ctx.fillStyle = fitaEsc;
    ctx.beginPath(); ctx.ellipse(cx, cy - 1, 2.8, 3.5, 0, 0, Math.PI * 2); ctx.fill();

    // ---- contorno arredondado da caixa ----
    ctx.strokeStyle = 'rgba(0,0,0,0.20)';
    ctx.lineWidth = 1;
    if (typeof ctx.roundRect === 'function') {
      ctx.beginPath(); ctx.roundRect(x, y, larg, h, arred); ctx.stroke();
    } else {
      ctx.strokeRect(x, y, larg, h);
    }
    ctx.restore();
  }

  function desenhar() {
    ctx.clearRect(0, 0, W, H);
    const dx = tremer > 0 ? (Math.random() - 0.5) * tremer : 0;
    ctx.save();
    ctx.translate(dx, 0);

    // fundo
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#EAF1DE');
    bg.addColorStop(0.6, '#F2EEDD');
    bg.addColorStop(1, '#E6DCC2');
    ctx.fillStyle = bg;
    ctx.fillRect(-10, 0, W + 20, H);

    // brilho de encaixe perfeito
    if (flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flash * 0.4})`;
      ctx.fillRect(-10, 0, W + 20, H);
    }

    // chão com sombra
    const baseY = H - 4 + rolagem;
    const sombraChao = ctx.createLinearGradient(0, baseY - 30, 0, baseY + 20);
    sombraChao.addColorStop(0, 'rgba(60,50,30,0)');
    sombraChao.addColorStop(1, 'rgba(60,50,30,0.18)');
    ctx.fillStyle = sombraChao;
    ctx.fillRect(-10, baseY - 30, W + 20, 50);

    // pilha (de trás p/ frente p/ respeitar sobreposição 3D)
    for (let i = 0; i < pilha.length; i++) {
      const caixa = pilha[i];
      const y = H - (i + 1) * alturaCaixa - profundidade + rolagem;
      desenharCaixa(caixa.x, y, caixa.largura, caixa.cor);
    }

    // linha-guia da última caixa
    if (rodando && atual && !atual.caindo) {
      const ultima = pilha[pilha.length - 1];
      const gy = H - (pilha.length + 1) * alturaCaixa - profundidade + rolagem;
      ctx.strokeStyle = 'rgba(86,107,47,0.30)';
      ctx.setLineDash([5, 5]);
      ctx.strokeRect(ultima.x, gy, ultima.largura, alturaCaixa);
      ctx.setLineDash([]);
    }

    // caixa em jogo
    if (rodando && atual) {
      desenharCaixa(atual.x, atual.y, atual.largura, atual.cor);
    }

    // partículas
    partes.forEach(p => {
      ctx.globalAlpha = clamp(p.vida, 0, 1);
      ctx.fillStyle = p.cor;
      ctx.fillRect(p.x, p.y, p.t, p.t);
    });
    ctx.globalAlpha = 1;

    ctx.restore();

    if (!rodando) {
      ctx.fillStyle = 'rgba(43,43,34,0.74)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFFFFF';
      ctx.textAlign = 'center';
      ctx.font = 'bold 22px sans-serif';
      ctx.fillText(vidas <= 0 ? 'Torre caiu! 💔' : 'Fim de jogo', W / 2, H / 2 - 14);
      ctx.font = '15px sans-serif';
      ctx.fillText('Andares: ' + andares + '   •   Pontos: ' + pontos, W / 2, H / 2 + 14);
      ctx.textAlign = 'left';
    }
  }

  function loop() {
    if (!rodando) return;

    if (atual.caindo) {
      atual.vy += 0.9;                 // gravidade
      atual.y += atual.vy;
      const ultima = pilha[pilha.length - 1];
      const alvoY = H - (pilha.length + 1) * alturaCaixa - profundidade + rolagem;
      if (atual.y >= alvoY) {
        atual.y = alvoY;
        confirmarEncaixe();
      }
    } else {
      // balança horizontalmente no topo
      const topoY = -alturaCaixa * 0.2;
      atual.y += (topoY - atual.y) * 0.2; // desce suave até o topo
      atual.x += atual.vel * atual.dir;
      if (atual.x + atual.largura >= W) { atual.x = W - atual.largura; atual.dir = -1; }
      if (atual.x <= 0) { atual.x = 0; atual.dir = 1; }
    }

    // partículas
    for (let i = partes.length - 1; i >= 0; i--) {
      const p = partes[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.vida -= 0.03;
      if (p.vida <= 0) partes.splice(i, 1);
    }

    if (flash > 0) flash = Math.max(0, flash - 0.04);
    if (tremer > 0) tremer = Math.max(0, tremer - 0.4);

    desenhar();
    idAnimacao = requestAnimationFrame(loop);
  }

  function empilhar() {
    if (!rodando || !atual || atual.caindo) return;
    atual.caindo = true;
    atual.vy = 4;
  }

  function confirmarEncaixe() {
    const ultima = pilha[pilha.length - 1];
    const inicioSobra = Math.max(atual.x, ultima.x);
    const fimSobra = Math.min(atual.x + atual.largura, ultima.x + ultima.largura);
    const sobra = fimSobra - inicioSobra;
    const desloc = atual.x - ultima.x;
    const perfeito = Math.abs(desloc) <= PERFEITO_TOL;

    if (sobra <= 6) { perderVida(); return; }

    // partículas de poeira na junta
    const py = H - (pilha.length + 1) * alturaCaixa - profundidade + rolagem;
    for (let i = 0; i < 10; i++) {
      partes.push({
        x: inicioSobra + Math.random() * sobra,
        y: py + alturaCaixa,
        vx: (Math.random() - 0.5) * 3,
        vy: -Math.random() * 3 - 1,
        t: 3 + Math.random() * 3,
        vida: 1,
        cor: perfeito ? '#FFD966' : 'rgba(255,255,255,0.8)',
      });
    }

    if (perfeito) {
      const x = clamp(ultima.x + desloc, 0, W - ultima.largura);
      pilha.push({ x, largura: ultima.largura, cor: atual.cor });
      flash = 1;
      pontos += PONTOS_ANDAR + BONUS_PERFEITO;
    } else {
      pilha.push({ x: inicioSobra, largura: sobra, cor: atual.cor });
      pontos += PONTOS_ANDAR;
    }
    andares++;
    andarEl.textContent = andares;
    pontosEl.textContent = pontos;
    if (pilha.length > 6) rolagem += alturaCaixa;
    novaCaixa();
  }

  function perderVida() {
    vidas--;
    vidasEl.textContent = vidas;
    tremer = 12;
    if (vidas <= 0) {
      fimDeJogo();
    } else {
      novaCaixa();
    }
  }

  function fimDeJogo() {
    if (!rodando) return;
    rodando = false;
    if (idAnimacao) cancelAnimationFrame(idAnimacao);
    desenhar();
    document.removeEventListener('keydown', aoTeclar);
    if (pontos > 0) dispararConfete();
    finalizarJogo('Empilhe os Presentes', pontos);

    const fimEl = container.querySelector('#presFim');
    fimEl.innerHTML = `<button class="btn-jogar btn-magnetic btn-magnetic--fill" id="presJogarDeNovo" data-magnetic><span>🔁 Jogar novamente</span></button>`;
    fimEl.querySelector('#presJogarDeNovo').addEventListener('click', () => {
      pararMusicaAtiva();           // evita música órfã ao reiniciar
      iniciarJogoPresentes(container);
    });
  }

  function aoTeclar(e) {
    if (e.code === 'Space') { e.preventDefault(); empilhar(); }
  }

  canvas.addEventListener('click', empilhar);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); empilhar(); }, { passive: false });
  document.addEventListener('keydown', aoTeclar);

  reset();
  desenhar();
  idAnimacao = requestAnimationFrame(loop);
}

// Efeito magnético (igual ao index) — segue o cursor e acende o brilho radial
document.querySelectorAll('[data-magnetic]').forEach(btn => {
  btn.addEventListener('mousemove', (e) => {
    if (btn.disabled) return;
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    btn.style.setProperty('--mx', `${((x / rect.width) * 100).toFixed(1)}%`);
    btn.style.setProperty('--my', `${((y / rect.height) * 100).toFixed(1)}%`);
    const moveX = (x - rect.width / 2) * 0.22;
    const moveY = (y - rect.height / 2) * 0.22;
    btn.style.transform = `translate(${moveX}px, ${moveY}px)`;
  });
  btn.addEventListener('mouseleave', () => {
    btn.style.transform = 'translate(0px, 0px)';
  });
});

</script>

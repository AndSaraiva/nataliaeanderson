<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade do Casamento — Natália &amp; Anderson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --oliva:#556B2F;
    --oliva-clara:#7C8F4B;
    --oliva-escura:#3E4E22;
    --dourado:#C9A227;
    --dourado-suave:#E4C767;
    --madeira:#8B5E3C;
    --creme:#FAF6EE;
    --branco:#FFFFFF;
    --carvao:#2B2B22;
    --carvao-suave:#5C5C4E;
    --linha:rgba(85,107,47,0.18);
    --sombra:0 18px 40px -18px rgba(43,43,34,0.35);
    --max:1080px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--creme); color:var(--carvao);
    font-family:'Jost',sans-serif; line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Fraunces',serif; font-weight:500; margin:0 0 10px;}
  p{margin:0;}
  .arcade-bg{
    position:fixed; inset:0; z-index:-1;
    background:
      radial-gradient(circle at 15% 10%, rgba(201,162,39,0.10), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(85,107,47,0.14), transparent 45%),
      linear-gradient(180deg, #FAF6EE 0%, #F3EEDE 100%);
  }
  .wrap{max-width:var(--max); margin:0 auto; padding:0 24px;}

  /* NAV */
  .arcade-nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 24px; max-width:var(--max); margin:0 auto;
  }
  .voltar-link{color:var(--oliva-escura); text-decoration:none; font-size:0.88rem; letter-spacing:0.02em;}
  .voltar-link:hover{text-decoration:underline;}
  .arcade-brand{font-family:'Fraunces',serif; font-size:1.1rem; color:var(--oliva-escura);}

  /* BOTÕES */
  .btn-arcade{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--oliva); color:var(--branco); border:none; border-radius:999px;
    padding:15px 30px; font-family:'Jost',sans-serif; font-size:0.95rem; letter-spacing:0.03em;
    cursor:pointer; transition:transform .3s ease, box-shadow .3s ease, background .3s ease;
    box-shadow:0 10px 26px -10px rgba(85,107,47,0.55);
  }
  .btn-arcade:hover{transform:translateY(-3px); background:var(--oliva-escura); box-shadow:0 16px 34px -12px rgba(85,107,47,0.6);}

  /* PORTÃO DE ENTRADA */
  .portao{min-height:88vh; display:flex; align-items:center; justify-content:center; padding:24px;}
  .portao-card{
    background:var(--branco); border:1px solid var(--linha); border-radius:24px;
    padding:52px 44px; max-width:460px; width:100%; text-align:center; box-shadow:var(--sombra);
  }
  .eyebrow-arcade{
    display:block; font-size:0.76rem; letter-spacing:0.32em; text-transform:uppercase;
    color:var(--dourado); margin-bottom:10px;
  }
  .portao-card h1{font-size:2.1rem; color:var(--oliva-escura);}
  .portao-card p{color:var(--carvao-suave); margin-top:12px; font-size:0.95rem;}
  #formEntrada{margin-top:28px; display:flex; flex-direction:column; gap:14px;}
  .autocomplete-wrap{position:relative;}
  .autocomplete-list{
    position:absolute; left:0; right:0; top:calc(100% + 6px); z-index:20;
    list-style:none; margin:0; padding:6px; max-height:220px; overflow-y:auto;
    background:var(--creme); border:1px solid var(--linha); border-radius:12px; box-shadow:var(--sombra);
    text-align:left;
  }
  .autocomplete-list li{
    padding:10px 12px; border-radius:8px; cursor:pointer; font-size:0.94rem;
    transition:background .15s ease;
  }
  .autocomplete-list li:hover{background:var(--areia-funda,#F3EEDE);}
  #formEntrada .autocomplete-list li{color:var(--carvao);}
  #nomeJogador{
    width:100%; padding:14px 16px; border-radius:12px; border:1px solid var(--linha);
    background:var(--creme); font-family:'Jost'; font-size:0.98rem; color:var(--carvao);
  }
  #nomeJogador:focus{outline:2px solid var(--oliva-clara); outline-offset:1px;}
  #formEntrada .erro-nome{
    color:var(--madeira); font-size:0.84rem; text-align:left; margin-top:-4px;
  }

  /* ÁREA DO ARCADE */
  .area-arcade{max-width:var(--max); margin:0 auto; padding:10px 24px 90px;}
  .boas-vindas{
    text-align:center; font-family:'Fraunces',serif; font-size:1.3rem;
    color:var(--oliva-escura); margin:14px 0 40px;
  }
  .boas-vindas span{color:var(--dourado);}

  .jogos-secao h2{text-align:center; color:var(--oliva-escura); margin-bottom:28px;}
  .jogos-grid{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:22px;
  }
  @media (max-width:860px){
    .jogos-grid{grid-template-columns:repeat(2, 1fr);}
  }
  @media (max-width:520px){
    .jogos-grid{grid-template-columns:1fr;}
  }
  .card-jogo{
    position:relative; background:var(--branco); border:1px solid var(--linha); border-radius:20px;
    padding:28px 24px; text-align:center; box-shadow:var(--sombra);
    transition:transform .35s ease, box-shadow .35s ease;
  }
  .card-jogo:hover{transform:translateY(-8px) scale(1.015); box-shadow:0 26px 50px -16px rgba(43,43,34,0.32);}
  .card-jogo.em-breve{opacity:0.6; filter:grayscale(0.4);}
  .badge-em-breve{
    position:absolute; top:14px; right:14px; background:var(--madeira); color:var(--branco);
    font-size:0.66rem; letter-spacing:0.06em; text-transform:uppercase; padding:4px 10px; border-radius:999px;
  }
  .card-icone{font-size:2.6rem; margin-bottom:10px;}
  .card-jogo h3{font-size:1.15rem; color:var(--oliva-escura);}
  .card-jogo p{font-size:0.86rem; color:var(--carvao-suave); margin-top:8px; min-height:40px;}
  .card-melhor{font-size:0.82rem; color:var(--carvao-suave); margin-top:14px;}
  .card-melhor b{color:var(--dourado);}
  .btn-jogar{
    margin-top:16px; width:100%; padding:12px; border-radius:999px; border:1px solid var(--oliva);
    background:transparent; color:var(--oliva-escura); font-family:'Jost'; font-size:0.9rem;
    cursor:pointer; transition:background .3s ease, color .3s ease;
  }
  .btn-jogar:hover:not(:disabled){background:var(--oliva); color:var(--branco);}
  .btn-jogar:disabled{opacity:0.55; cursor:not-allowed; border-color:var(--linha);}
  .card-jogo.ja-jogou{opacity:0.55; filter:grayscale(0.5);}
  .card-jogo.ja-jogou:hover{transform:none; box-shadow:var(--sombra);}

  /* ÁREA DE JOGO */
  .area-jogo{max-width:720px; margin:0 auto; padding:24px 24px 90px;}
  .btn-voltar-jogo{
    background:none; border:none; color:var(--oliva-escura); font-family:'Jost'; font-size:0.9rem;
    cursor:pointer; margin-bottom:18px; padding:8px 0;
  }
  .btn-voltar-jogo:hover{text-decoration:underline;}
  #jogoConteudo{
    background:var(--branco); border:1px solid var(--linha); border-radius:22px;
    padding:32px; box-shadow:var(--sombra); text-align:center;
  }
  .jogo-cabecalho{margin-bottom:22px;}
  .jogo-cabecalho h2{color:var(--oliva-escura); font-size:1.4rem;}
  .jogo-stats{display:flex; justify-content:center; gap:22px; font-size:0.85rem; color:var(--carvao-suave); margin-top:6px;}
  .jogo-final h2{color:var(--oliva-escura);}
  .jogo-final p{margin-top:10px; color:var(--carvao-suave);}

  /* QUIZ */
  .quiz-pergunta{font-size:1.1rem; font-family:'Fraunces',serif; color:var(--carvao); margin-bottom:22px;}
  .quiz-opcoes{display:grid; gap:12px;}
  .quiz-opcao{
    padding:14px 16px; border-radius:12px; border:1px solid var(--linha); background:var(--creme);
    font-family:'Jost'; font-size:0.94rem; cursor:pointer; text-align:left;
    transition:background .25s ease, border-color .25s ease, transform .2s ease;
  }
  .quiz-opcao:hover:not(:disabled){transform:translateX(4px); border-color:var(--oliva);}
  .quiz-opcao.selecionada{background:rgba(85,107,47,0.18); border-color:var(--oliva); font-weight:600;}
  .quiz-opcao:disabled{cursor:default;}

  /* JOGO DA MEMÓRIA */
  .memoria-grid{
    display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; max-width:420px; margin:0 auto;
  }
  .carta-memoria{
    position:relative; aspect-ratio:1; border-radius:12px; border:none; cursor:pointer;
    background:transparent; perspective:600px; padding:0;
  }
  .carta-frente, .carta-verso{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    border-radius:12px; backface-visibility:hidden; transition:transform .5s cubic-bezier(.16,1,.3,1);
    font-size:1.6rem; overflow:hidden;
  }
  .carta-frente{background:linear-gradient(150deg,var(--oliva),var(--oliva-escura)); color:var(--dourado-suave); font-family:'Fraunces',serif;}
  .carta-verso{background:var(--branco); border:1px solid var(--linha); transform:rotateY(180deg);}
  .carta-verso img{width:100%; height:100%; object-fit:cover;}
  .carta-memoria.virada .carta-frente{transform:rotateY(180deg);}
  .carta-memoria.virada .carta-verso{transform:rotateY(0deg);}
  .carta-memoria.encontrada .carta-verso{background:rgba(85,107,47,0.15); border-color:var(--oliva);}

  /* FLAPPY ALIANÇA */
  #flapCanvas{
    max-width:100%; border-radius:16px; border:1px solid var(--linha);
    touch-action:none; cursor:pointer; display:block; margin:0 auto;
  }
  .flap-dica{margin-top:14px; font-size:0.85rem; color:var(--carvao-suave);}
  .flap-fim{margin-top:18px;}
  .flap-fim .btn-jogar{max-width:240px; margin:0 auto;}

  /* ENCONTRE O ANEL */
  .anel-cena{
    position:relative; width:100%; height:320px; background:var(--creme);
    border:1px solid var(--linha); border-radius:16px; overflow:hidden;
  }
  .anel-item{
    position:absolute; font-size:1.5rem; cursor:pointer; user-select:none;
    transition:transform .15s ease, opacity .3s ease;
  }
  .anel-item:hover{transform:scale(1.2);}
  .anel-item.anel-errado{opacity:0.25; pointer-events:none;}

  /* CORTA O BOLO */
  .bolo-trilha{
    position:relative; width:100%; height:54px; background:var(--creme);
    border:1px solid var(--linha); border-radius:999px; margin:10px 0 22px; overflow:hidden;
  }
  .bolo-zona{
    position:absolute; top:0; bottom:0; background:rgba(201,162,39,0.35); border-left:2px solid var(--dourado); border-right:2px solid var(--dourado);
  }
  .bolo-faca{
    position:absolute; top:4px; bottom:4px; width:6px; margin-left:-3px;
    background:var(--oliva-escura); border-radius:4px; transition:background .2s ease;
  }
  .bolo-faca.bolo-acerto{background:var(--dourado);}
  .bolo-faca.bolo-erro{background:var(--madeira);}

  /* EMPILHE OS PRESENTES */
  #presCanvas{
    max-width:100%; border-radius:16px; border:1px solid var(--linha);
    touch-action:none; cursor:pointer; display:block; margin:0 auto;
  }

  /* CONFETES */
  .confete-container{position:fixed; inset:0; pointer-events:none; z-index:80; overflow:hidden;}
  .confete-item{
    position:absolute; top:-12px; width:8px; height:14px; border-radius:2px;
    animation-name:confeteQueda; animation-timing-function:ease-in;
  }
  @keyframes confeteQueda{
    0%{transform:translateY(0) rotate(0deg); opacity:1;}
    100%{transform:translateY(105vh) rotate(540deg); opacity:0.2;}
  }

  .reveal{opacity:0; transform:translateY(20px); animation:fadeUp .8s ease forwards;}
  @keyframes fadeUp{to{opacity:1; transform:translateY(0);}}

  @media (max-width:640px){
    .memoria-grid{grid-template-columns:repeat(3,1fr);}
    .portao-card{padding:38px 26px;}
  }
</style>
</head>
<body>

<div class="arcade-bg" aria-hidden="true"></div>

<header class="arcade-nav">
  <a href="./casamento-anderson-natalia.html" class="voltar-link">← Voltar ao site</a>
  <span class="arcade-brand">🎮 Arcade do Casamento</span>
</header>

<!-- PORTÃO DE ENTRADA -->
<section id="portao" class="portao">
  <div class="portao-card">
    <span class="eyebrow-arcade">Bem-vindo(a) ao</span>
    <h1>Arcade do Casamento</h1>
    <p>Digite seu nome, jogue, suba no ranking e concorra a brindes no dia do casamento! 🎁</p>
    <form id="formEntrada">
      <div class="autocomplete-wrap">
        <input type="text" id="nomeJogador" placeholder="Digite seu nome..." required maxlength="60" autocomplete="off">
        <ul id="nome-sugestoes-arcade" class="autocomplete-list" hidden></ul>
      </div>
      <p id="erroNome" class="erro-nome" hidden></p>
      <button type="submit" class="btn-arcade">Entrar no Arcade 🎮</button>
    </form>
  </div>
</section>

<!-- ÁREA DO ARCADE -->
<main id="areaArcade" class="area-arcade" hidden>
  <p class="boas-vindas">Bem-vindo(a), <span id="nomeExibido"></span>! Boa sorte 🍀</p>

  <section class="jogos-secao">
    <h2>🎮 Escolha seu jogo</h2>
    <div class="jogos-grid" id="jogosGrid"></div>
  </section>
</main>

<!-- ÁREA DE JOGO -->
<div id="areaJogo" class="area-jogo" hidden>
  <button id="voltarArcade" class="btn-voltar-jogo">← Voltar ao Arcade</button>
  <div id="jogoConteudo"></div>
</div>

<div id="confeteContainer" class="confete-container" aria-hidden="true"></div>

<script>
// ===================================================================
// Arcade do Casamento — Natália & Anderson
// ===================================================================

// Mesma planilha/Apps Script já usado no RSVP do site principal
const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbypL1nyxU6hNOtw8brrhWlynwM96YEjbYXqsn1JfS9W2_X8ZLZHeJG4Zb-bYAwHgwUO/exec';

let jogadorAtual = '';
let listaConvidados = [];     // ['Anderson', 'Andre', ...] — todos da planilha
let jogosJaJogados = [];      // ['Quiz dos Noivos'] — jogos que ESTA pessoa já jogou (vem do backend)
const melhoresSessao = {}; // melhor pontuação de CADA jogo, só nesta sessão do navegador

// Carrega a lista oficial de convidados assim que o Arcade abre
carregarConvidados();

// -------------------------------------------------------------
// PERGUNTAS DO QUIZ — PERSONALIZE aqui com fatos reais do casal
// "correta" é o índice (0,1,2,3) da opção certa dentro de "opcoes"
// -------------------------------------------------------------
const perguntasQuiz = [
  { pergunta: 'Em que cidade será o casamento?', opcoes: ['Recife', 'Fortaleza', 'Salvador', 'João Pessoa'], correta: 1 },
  { pergunta: 'Qual a data do grande dia?', opcoes: ['18 de junho de 2027', '10 de maio de 2027', '25 de dezembro de 2026', '14 de fevereiro de 2027'], correta: 0 },
  { pergunta: 'Onde Anderson fez o pedido de casamento?', opcoes: ['Numa praia', 'Numa estufa de orquídeas', 'Num restaurante', 'Num show'], correta: 1 },
  // PERSONALIZE as 7 perguntas abaixo com fatos reais de vocês dois:
  { pergunta: 'Em que ano Natália e Anderson começaram a namorar? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
  { pergunta: 'Qual é a comida favorita do casal? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
  { pergunta: 'Qual o time de futebol do Anderson? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
  { pergunta: 'Onde foi o primeiro encontro do casal? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
  { pergunta: 'Qual o hobby favorito da Natália? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
  { pergunta: 'Qual música não pode faltar na festa? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
  { pergunta: 'Qual o sonho de viagem do casal? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
];

// -------------------------------------------------------------
// LISTA DE JOGOS
// -------------------------------------------------------------
const jogosDisponiveis = [
  { id: 'quiz', nome: 'Quiz dos Noivos', icone: '💌', desc: '10 perguntas sobre o casal. Responda rápido pra ganhar bônus!', ativo: true, iniciar: iniciarJogoQuiz },
  { id: 'memoria', nome: 'Jogo da Memória', icone: '🧠', desc: 'Encontre os pares com o menor número de movimentos.', ativo: true, iniciar: iniciarJogoMemoria },
  { id: 'flappy', nome: 'Flappy Aliança', icone: '💍', desc: 'Desvie dos obstáculos e voe o mais longe possível.', ativo: true, iniciar: iniciarJogoFlappy },
  { id: 'anel', nome: 'Encontre o Anel', icone: '🔍', desc: 'Ache a aliança certa escondida entre os itens da cena.', ativo: true, iniciar: iniciarJogoAnel },
  { id: 'bolo', nome: 'Corta o Bolo', icone: '🎂', desc: 'Clique no momento certo pra cortar a fatia perfeita.', ativo: true, iniciar: iniciarJogoBolo },
  { id: 'presentes', nome: 'Empilhe os Presentes', icone: '🎁', desc: 'Empilhe as caixas sem deixar a torre cair.', ativo: true, iniciar: iniciarJogoPresentes },
];

// -------------------------------------------------------------
// CARREGAR LISTA DE CONVIDADOS (mesma fonte do RSVP do site principal)
// -------------------------------------------------------------
async function carregarConvidados() {
  try {
    const res = await fetch(URL_APPS_SCRIPT);
    const dados = await res.json();
    listaConvidados = (dados || []).map(item => String(item.nome || '').trim()).filter(Boolean);
  } catch (e) {
    console.error('Não foi possível carregar a lista de convidados', e);
    listaConvidados = [];
  }
}

// -------------------------------------------------------------
// AUTOCOMPLETE DO NOME
// -------------------------------------------------------------
const inputNome = document.getElementById('nomeJogador');
const sugestoesEl = document.getElementById('nome-sugestoes-arcade');
const erroEl = document.getElementById('erroNome');

function mostrarSugestoes() {
  const termo = inputNome.value.trim().toLowerCase();
  sugestoesEl.innerHTML = '';
  // Esconde a mensagem de erro assim que a pessoa volta a digitar
  if (erroEl) { erroEl.hidden = true; erroEl.textContent = ''; }
  if (!termo) { sugestoesEl.hidden = true; return; }

  const resultados = listaConvidados
    .filter(n => n.toLowerCase().includes(termo))
    .sort((a, b) => a.localeCompare(b, 'pt-BR'))
    .slice(0, 6);

  if (resultados.length === 0) { sugestoesEl.hidden = true; return; }

  resultados.forEach(nome => {
    const li = document.createElement('li');
    li.textContent = nome;
    li.addEventListener('mousedown', (e) => {
      // mousedown em vez de click pra disparar antes do blur do input
      e.preventDefault();
      inputNome.value = nome;
      sugestoesEl.hidden = true;
    });
    sugestoesEl.appendChild(li);
  });
  sugestoesEl.hidden = false;
}

inputNome.addEventListener('input', mostrarSugestoes);
inputNome.addEventListener('focus', mostrarSugestoes);
inputNome.addEventListener('blur', () => {
  // espera 150ms pra não fechar antes do mousedown da sugestão
  setTimeout(() => { sugestoesEl.hidden = true; }, 150);
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('.autocomplete-wrap')) sugestoesEl.hidden = true;
});

// -------------------------------------------------------------
// SUBMIT DO PORTÃO — valida nome na lista e busca jogos já jogados
// -------------------------------------------------------------
document.getElementById('formEntrada').addEventListener('submit', async (e) => {
  e.preventDefault();
  const nome = inputNome.value.trim();
  if (!nome) return;

  // 1) Confere se o nome está na lista oficial
  const bate = listaConvidados.some(n => n.toLowerCase() === nome.toLowerCase());
  if (!bate) {
    erroEl.textContent = 'Nome não encontrado. Escolha um nome da lista de convidados.';
    erroEl.hidden = false;
    return;
  }

  // 2) Busca no backend quais jogos essa pessoa já jogou (defesa em profundidade)
  try {
    const res = await fetch(URL_APPS_SCRIPT + '?acao=ranking&nome=' + encodeURIComponent(nome));
    const data = await res.json();
    jogosJaJogados = (data && data.jogos) || [];
  } catch (err) {
    console.error('Não foi possível consultar o ranking, seguindo sem ele', err);
    jogosJaJogados = [];
  }

  // 3) Entra no Arcade
  jogadorAtual = nome;
  document.getElementById('nomeExibido').textContent = nome;
  document.getElementById('portao').hidden = true;
  document.getElementById('areaArcade').hidden = false;
  renderizarCards();
  document.getElementById('areaArcade').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// -------------------------------------------------------------
// CARDS DOS JOGOS
// -------------------------------------------------------------
function renderizarCards() {
  const grid = document.getElementById('jogosGrid');
  grid.innerHTML = jogosDisponiveis.map(j => {
    // Trava SÓ pro Quiz dos Noivos. Memória e Flappy podem jogar quantas vezes quiser.
    const jaJogou = j.nome === 'Quiz dos Noivos' && jogosJaJogados.includes(j.nome);
    const classeExtra = j.ativo ? (jaJogou ? 'ja-jogou' : '') : 'em-breve';
    const badge = !j.ativo ? '<span class="badge-em-breve">Em breve</span>'
                 : jaJogou ? '<span class="badge-em-breve" style="background:var(--oliva);">Já jogou</span>'
                 : '';
    const textoBtn = !j.ativo ? 'Em breve' : (jaJogou ? '✅ Já jogou' : 'Jogar');
    const rodape = jaJogou
      ? 'Status: <b style="color:var(--oliva-escura);">já jogou nesta conta</b>'
      : `Sua melhor pontuação: <b>${melhoresSessao[j.nome] || '—'}</b>`;
    return `
      <div class="card-jogo ${classeExtra} reveal">
        ${badge}
        <div class="card-icone">${j.icone}</div>
        <h3>${j.nome}</h3>
        <p>${j.desc}</p>
        <div class="card-melhor">${rodape}</div>
        <button class="btn-jogar" data-id="${j.id}" ${(!j.ativo || jaJogou) ? 'disabled' : ''}>${textoBtn}</button>
      </div>
    `;
  }).join('');
  grid.querySelectorAll('.btn-jogar').forEach(btn => {
    btn.addEventListener('click', () => {
      const jogo = jogosDisponiveis.find(j => j.id === btn.dataset.id);
      if (jogo && jogo.ativo && !btn.disabled) abrirJogo(jogo);
    });
  });
}

async function abrirJogo(jogo) {
  // Checagem extra de segurança: pergunta de novo ao backend se essa pessoa já jogou
  try {
    const res = await fetch(URL_APPS_SCRIPT + '?acao=ranking&nome=' + encodeURIComponent(jogadorAtual));
    const data = await res.json();
    const jogos = (data && data.jogos) || [];
    // Trava de defesa em profundidade SÓ pro Quiz dos Noivos
    if (jogo.nome === 'Quiz dos Noivos' && jogos.includes('Quiz dos Noivos')) {
      // Atualiza a trava local e avisa
      jogosJaJogados = jogos;
      renderizarCards();
      alert('Você já jogou o Quiz dos Noivos. Ele só pode ser jogado uma vez por pessoa.');
      return;
    }
    jogosJaJogados = jogos; // sincroniza (caso a pessoa tenha jogado de outro dispositivo)
  } catch (err) {
    console.error('Falha ao checar ranking antes de abrir o jogo', err);
    // Se a rede falhou, deixa entrar — o doPost ainda recusa com ja_jogou se for o caso
  }

  document.getElementById('areaArcade').hidden = true;
  document.getElementById('areaJogo').hidden = false;
  document.getElementById('areaJogo').scrollIntoView({ behavior: 'auto', block: 'start' });
  jogo.iniciar(document.getElementById('jogoConteudo'));
}

document.getElementById('voltarArcade').addEventListener('click', voltarParaArcade);
function voltarParaArcade() {
  document.getElementById('areaJogo').hidden = true;
  document.getElementById('areaArcade').hidden = false;
  renderizarCards();
  document.getElementById('areaArcade').scrollIntoView({ behavior: 'auto', block: 'start' });
}

// -------------------------------------------------------------
// FINALIZAR JOGO — envia pontuação, dispara confete se for recorde
// -------------------------------------------------------------
function finalizarJogo(jogo, pontos) {
  const recordeAnterior = melhoresSessao[jogo] || 0;
  if (pontos > recordeAnterior) {
    melhoresSessao[jogo] = pontos;
    dispararConfete();
  }
  enviarPontuacao(jogadorAtual, jogo, pontos);
}

async function enviarPontuacao(nome, jogo, pontos) {
  try {
    const res = await fetch(URL_APPS_SCRIPT, {
      method: 'POST',
      body: JSON.stringify({ acao: 'pontuar', nome, jogo, pontos })
    });
    const data = await res.json().catch(() => ({ ok: false }));
    if (data && data.ok === false && data.motivo === 'ja_jogou') {
      // Backend confirmou que essa pessoa já jogou o Quiz. Trava local e volta pro Arcade.
      if (!jogosJaJogados.includes(jogo)) jogosJaJogados.push(jogo);
      const container = document.getElementById('jogoConteudo');
      if (container) {
        container.innerHTML = `
          <div class="jogo-final">
            <h2>Você já jogou o Quiz dos Noivos</h2>
            <p>O Quiz só pode ser jogado uma vez por pessoa. Voltando ao Arcade...</p>
          </div>`;
      }
      setTimeout(() => voltarParaArcade(), 1800);
      return;
    }
  } catch (e) {
    console.error('Não foi possível salvar a pontuação', e);
  }
}

// -------------------------------------------------------------
// CONFETE
// -------------------------------------------------------------
function dispararConfete() {
  const cont = document.getElementById('confeteContainer');
  const cores = ['#556B2F', '#C9A227', '#FFFFFF', '#8B5E3C'];
  for (let i = 0; i < 44; i++) {
    const c = document.createElement('span');
    c.className = 'confete-item';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = cores[Math.floor(Math.random() * cores.length)];
    c.style.animationDuration = (Math.random() * 1.4 + 1.6) + 's';
    c.style.animationDelay = (Math.random() * 0.3) + 's';
    cont.appendChild(c);
    setTimeout(() => c.remove(), 3500);
  }
}

// ===================================================================
// JOGO 1 — QUIZ DOS NOIVOS
// ===================================================================
function iniciarJogoQuiz(container) {
  let atual = 0, pontos = 0;
  const inicio = Date.now();

  function render() {
    if (atual >= perguntasQuiz.length) {
      const segundos = Math.floor((Date.now() - inicio) / 1000);
      const bonus = Math.max(0, 200 - segundos * 2);
      const total = pontos + bonus;
      const mensagem = total >= 800
        ? 'Você conhece muito bem os noivos! 💛'
        : 'Acho que você precisa conversar mais com eles 😄';
      container.innerHTML = `
        <div class="jogo-final">
          <h2>${mensagem}</h2>
          <p>Pontuação final: <b>${total}</b> (bônus de velocidade: +${bonus})</p>
        </div>`;
      finalizarJogo('Quiz dos Noivos', total);
      return;
    }
    const p = perguntasQuiz[atual];
    container.innerHTML = `
      <div class="jogo-cabecalho">
        <h2>💌 Quiz dos Noivos</h2>
        <div class="jogo-stats"><span>Pergunta ${atual + 1} de ${perguntasQuiz.length}</span><span>Pontos: ${pontos}</span></div>
      </div>
      <p class="quiz-pergunta">${p.pergunta}</p>
      <div class="quiz-opcoes">
        ${p.opcoes.map((o, i) => `<button class="quiz-opcao" data-i="${i}">${o}</button>`).join('')}
      </div>
    `;
    container.querySelectorAll('.quiz-opcao').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = Number(btn.dataset.i);
        const certa = i === p.correta;
        btn.classList.add('selecionada');
        if (certa) pontos += 100;
        container.querySelectorAll('.quiz-opcao').forEach(b => b.disabled = true);
        setTimeout(() => { atual++; render(); }, 500);
      });
    });
  }
  render();
}

// ===================================================================
// JOGO 2 — JOGO DA MEMÓRIA
// ===================================================================
function iniciarJogoMemoria(container) {
  const simbolos = ['./foto1.jpeg', './foto2.jpeg', './foto3.jpeg', './foto4.jpeg', './foto5.jpeg', './foto6.jpeg'];
  const cartas = embaralhar([...simbolos, ...simbolos]).map((s, i) => ({ id: i, simbolo: s, virada: false, encontrada: false }));
  let primeira = null, segunda = null, travado = false, movimentos = 0, pares = 0;
  const inicio = Date.now();

  container.innerHTML = `
    <div class="jogo-cabecalho">
      <h2>🧠 Jogo da Memória</h2>
      <div class="jogo-stats"><span>Movimentos: <b id="memMovimentos">0</b></span><span>Tempo: <b id="memTempo">0s</b></span></div>
    </div>
    <div class="memoria-grid" id="memoriaGrid"></div>
  `;
  const grid = container.querySelector('#memoriaGrid');
  const movEl = container.querySelector('#memMovimentos');
  const tempoEl = container.querySelector('#memTempo');

  const timerInt = setInterval(() => {
    tempoEl.textContent = Math.floor((Date.now() - inicio) / 1000) + 's';
  }, 1000);

  cartas.forEach(carta => {
    const el = document.createElement('button');
    el.className = 'carta-memoria';
    el.innerHTML = `<span class="carta-frente">?</span><span class="carta-verso"><img src="${carta.simbolo}" alt="Foto de Natália e Anderson"></span>`;
    el.addEventListener('click', () => {
      if (travado || carta.virada || carta.encontrada) return;
      carta.virada = true;
      el.classList.add('virada');
      if (!primeira) { primeira = { carta, el }; return; }
      segunda = { carta, el };
      movimentos++; movEl.textContent = movimentos;
      travado = true;
      setTimeout(() => {
        if (primeira.carta.simbolo === segunda.carta.simbolo) {
          primeira.el.classList.add('encontrada');
          segunda.el.classList.add('encontrada');
          primeira.carta.encontrada = segunda.carta.encontrada = true;
          pares++;
          if (pares === simbolos.length) {
            clearInterval(timerInt);
            const segundos = Math.floor((Date.now() - inicio) / 1000);
            const pontos = Math.max(100, 1000 - movimentos * 10 - segundos * 5);
            setTimeout(() => {
              container.innerHTML = `
                <div class="jogo-final">
                  <h2>Parabéns, vocês combinam mesmo! 💍</h2>
                  <p>Completou em <b>${movimentos}</b> movimentos e <b>${segundos}s</b><br>Pontuação: <b>${pontos}</b></p>
                </div>
                <div class="flap-fim">
                  <button class="btn-jogar" id="memJogarDeNovo">🔁 Jogar novamente</button>
                </div>`;
              finalizarJogo('Jogo da Memória', pontos);
              container.querySelector('#memJogarDeNovo').addEventListener('click', () => iniciarJogoMemoria(container));
            }, 500);
          }
        } else {
          primeira.el.classList.remove('virada');
          segunda.el.classList.remove('virada');
          primeira.carta.virada = segunda.carta.virada = false;
        }
        primeira = null; segunda = null; travado = false;
      }, 700);
    });
    grid.appendChild(el);
  });
}

function embaralhar(arr) {
  return arr.map(v => [Math.random(), v]).sort((a, b) => a[0] - b[0]).map(v => v[1]);
}

// ===================================================================
// JOGO 3 — FLAPPY ALIANÇA
// ===================================================================
function iniciarJogoFlappy(container) {
  container.innerHTML = `
    <div class="jogo-cabecalho">
      <h2>💍 Flappy Aliança</h2>
      <div class="jogo-stats"><span>Pontos: <b id="flapPontos">0</b></span></div>
    </div>
    <canvas id="flapCanvas" width="340" height="440"></canvas>
    <p class="flap-dica">Toque na tela (ou aperte espaço) pra fazer a aliança voar</p>
    <div id="flapFim" class="flap-fim"></div>
  `;
  const canvas = container.querySelector('#flapCanvas');
  const ctx = canvas.getContext('2d');
  const pontosEl = container.querySelector('#flapPontos');
  const W = canvas.width, H = canvas.height;

  const anel = { x: 66, y: H / 2, vy: 0, r: 15 };
  const gravidade = 0.42;
  const forcaVoo = -7.2;
  const gapAltura = 148;
  const velocidade = 2.5;
  const tiposObstaculo = ['💒', '💐', '👰‍♀️', '🤵', '🥂'];

  let obstaculos = [];
  let pontos = 0;
  let rodando = true;
  let frame = 0;
  let idAnimacao = null;

  function criarObstaculo() {
    const centro = 90 + Math.random() * (H - 180);
    obstaculos.push({ x: W + 30, centro, passou: false, tipo: tiposObstaculo[Math.floor(Math.random() * tiposObstaculo.length)] });
  }

  function desenhar() {
    ctx.clearRect(0, 0, W, H);
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#DCE8C8');
    grad.addColorStop(1, '#F5EFDD');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.font = '30px serif';
    obstaculos.forEach(o => {
      ctx.fillStyle = '#556B2F';
      ctx.fillRect(o.x - 17, 0, 34, o.centro - gapAltura / 2);
      ctx.fillRect(o.x - 17, o.centro + gapAltura / 2, 34, H - (o.centro + gapAltura / 2));
      ctx.fillText(o.tipo, o.x - 16, Math.max(28, o.centro - gapAltura / 2 - 6));
      ctx.fillText(o.tipo, o.x - 16, Math.min(H - 6, o.centro + gapAltura / 2 + 30));
    });

    ctx.font = '34px serif';
    ctx.fillText('💍', anel.x - 17, anel.y + 12);

    if (!rodando) {
      ctx.fillStyle = 'rgba(43,43,34,0.72)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '22px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Fim de jogo!', W / 2, H / 2 - 10);
      ctx.font = '16px sans-serif';
      ctx.fillText('Pontos: ' + pontos, W / 2, H / 2 + 20);
      ctx.textAlign = 'left';
    }
  }

  function loop() {
    if (!rodando) return;
    frame++;
    anel.vy += gravidade;
    anel.y += anel.vy;

    if (frame % 90 === 0) criarObstaculo();
    obstaculos.forEach(o => { o.x -= velocidade; });
    obstaculos = obstaculos.filter(o => o.x > -40);

    obstaculos.forEach(o => {
      if (!o.passou && o.x < anel.x) { o.passou = true; pontos++; pontosEl.textContent = pontos; }
      const colideX = Math.abs(o.x - anel.x) < 27;
      const colideY = anel.y - anel.r < o.centro - gapAltura / 2 || anel.y + anel.r > o.centro + gapAltura / 2;
      if (colideX && colideY) fimDeJogo();
    });

    if (anel.y - anel.r < 0 || anel.y + anel.r > H) fimDeJogo();

    desenhar();
    if (rodando) idAnimacao = requestAnimationFrame(loop);
  }

  function voar() {
    if (!rodando) return;
    anel.vy = forcaVoo;
  }

  function fimDeJogo() {
    if (!rodando) return;
    rodando = false;
    if (idAnimacao) cancelAnimationFrame(idAnimacao);
    desenhar();
    document.removeEventListener('keydown', aoTeclar);
    finalizarJogo('Flappy Aliança', pontos * 20);

    const fimEl = container.querySelector('#flapFim');
    fimEl.innerHTML = `
      <button class="btn-jogar" id="flapJogarDeNovo">🔁 Jogar novamente</button>
    `;
    fimEl.querySelector('#flapJogarDeNovo').addEventListener('click', () => {
      iniciarJogoFlappy(container);
    });
  }

  function aoTeclar(e) {
    if (e.code === 'Space') { e.preventDefault(); voar(); }
  }

  canvas.addEventListener('click', voar);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); voar(); }, { passive: false });
  document.addEventListener('keydown', aoTeclar);

  desenhar();
  idAnimacao = requestAnimationFrame(loop);
}

// ===================================================================
// JOGO 4 — ENCONTRE O ANEL
// ===================================================================
function iniciarJogoAnel(container) {
  const RODADAS = [
    { itens: 18, tempo: 12 },
    { itens: 28, tempo: 11 },
    { itens: 40, tempo: 10 },
  ];
  const decoys = ['⚪', '🔘', '🟡', '🟠', '🔶', '🔸', '🟤', '⭐'];
  const alvo = '💍';

  let rodadaAtual = 0;
  let pontosTotais = 0;
  let tempoRestante = 0;
  let intervaloId = null;

  function montarCabecalho() {
    return `
      <div class="jogo-cabecalho">
        <h2>🔍 Encontre o Anel</h2>
        <div class="jogo-stats">
          <span>Rodada ${rodadaAtual + 1} de ${RODADAS.length}</span>
          <span>Tempo: <b id="anelTempo">0</b>s</span>
          <span>Pontos: <b id="anelPontos">${pontosTotais}</b></span>
        </div>
      </div>
    `;
  }

  function jogarRodada() {
    const config = RODADAS[rodadaAtual];
    tempoRestante = config.tempo;

    const posicoes = [];
    for (let i = 0; i < config.itens; i++) {
      posicoes.push({
        top: Math.random() * 88 + '%',
        left: Math.random() * 92 + '%',
        rot: (Math.random() * 40 - 20) + 'deg',
      });
    }
    const indiceAlvo = Math.floor(Math.random() * config.itens);

    container.innerHTML = `
      ${montarCabecalho()}
      <div class="anel-cena" id="anelCena"></div>
      <p class="flap-dica">Ache a aliança 💍 escondida entre os outros itens, antes do tempo acabar!</p>
    `;

    const cena = container.querySelector('#anelCena');
    for (let i = 0; i < config.itens; i++) {
      const span = document.createElement('span');
      span.className = 'anel-item';
      span.textContent = i === indiceAlvo ? alvo : decoys[Math.floor(Math.random() * decoys.length)];
      span.style.top = posicoes[i].top;
      span.style.left = posicoes[i].left;
      span.style.transform = `rotate(${posicoes[i].rot})`;
      span.addEventListener('click', () => {
        if (i === indiceAlvo) {
          clearInterval(intervaloId);
          const pontosRodada = Math.max(20, tempoRestante * 30);
          pontosTotais += pontosRodada;
          proximaRodadaOuFim();
        } else {
          span.classList.add('anel-errado');
          tempoRestante = Math.max(0, tempoRestante - 1);
        }
      });
      cena.appendChild(span);
    }

    intervaloId = setInterval(() => {
      tempoRestante -= 1;
      const tEl = container.querySelector('#anelTempo');
      if (tEl) tEl.textContent = Math.max(0, tempoRestante);
      const pEl = container.querySelector('#anelPontos');
      if (pEl) pEl.textContent = pontosTotais;
      if (tempoRestante <= 0) {
        clearInterval(intervaloId);
        proximaRodadaOuFim();
      }
    }, 1000);
  }

  function proximaRodadaOuFim() {
    rodadaAtual++;
    if (rodadaAtual < RODADAS.length) {
      setTimeout(jogarRodada, 400);
    } else {
      const mensagem = pontosTotais >= 700 ? 'Olhar afiado! 👀💍' : 'Foi por pouco! Tenta de novo?';
      container.innerHTML = `
        <div class="jogo-final">
          <h2>${mensagem}</h2>
          <p>Pontuação final: <b>${pontosTotais}</b></p>
        </div>
        <div class="flap-fim">
          <button class="btn-jogar" id="anelJogarDeNovo">🔁 Jogar novamente</button>
        </div>
      `;
      finalizarJogo('Encontre o Anel', pontosTotais);
      container.querySelector('#anelJogarDeNovo').addEventListener('click', () => iniciarJogoAnel(container));
    }
  }

  rodadaAtual = 0;
  pontosTotais = 0;
  jogarRodada();
}

// ===================================================================
// JOGO 5 — CORTA O BOLO
// ===================================================================
function iniciarJogoBolo(container) {
  const TENTATIVAS = 5;
  let tentativaAtual = 0;
  let pontosTotais = 0;
  let posicao = 0;
  let direcao = 1;
  let velocidade = 1.6;
  let travado = false;
  let idAnimacao = null;
  let zonaCentro = 50;
  let zonaLargura = 18;

  function novaZona() {
    zonaLargura = Math.max(10, 20 - tentativaAtual * 2);
    zonaCentro = 15 + Math.random() * 70;
  }

  function render() {
    container.innerHTML = `
      <div class="jogo-cabecalho">
        <h2>🎂 Corta o Bolo</h2>
        <div class="jogo-stats">
          <span>Fatia ${tentativaAtual + 1} de ${TENTATIVAS}</span>
          <span>Pontos: <b id="boloPontos">${pontosTotais}</b></span>
        </div>
      </div>
      <div class="bolo-trilha">
        <div class="bolo-zona" style="left:${zonaCentro - zonaLargura / 2}%; width:${zonaLargura}%;"></div>
        <div class="bolo-faca" id="boloFaca" style="left:${posicao}%;"></div>
      </div>
      <button class="btn-arcade" id="boloCortar">🔪 Cortar!</button>
      <p class="flap-dica">Clique quando a faca estiver bem em cima da faixa dourada</p>
    `;
    container.querySelector('#boloCortar').addEventListener('click', cortar);
  }

  function loop() {
    if (travado) return;
    posicao += velocidade * direcao;
    if (posicao >= 100) { posicao = 100; direcao = -1; }
    if (posicao <= 0) { posicao = 0; direcao = 1; }
    const facaEl = container.querySelector('#boloFaca');
    if (facaEl) facaEl.style.left = posicao + '%';
    idAnimacao = requestAnimationFrame(loop);
  }

  function cortar() {
    if (travado) return;
    travado = true;
    if (idAnimacao) cancelAnimationFrame(idAnimacao);

    const distancia = Math.abs(posicao - zonaCentro);
    const dentroDaZona = distancia <= zonaLargura / 2;
    const pontosRodada = dentroDaZona ? Math.round(100 - (distancia / (zonaLargura / 2)) * 40) : Math.max(0, 30 - Math.round(distancia));
    pontosTotais += pontosRodada;

    const facaEl = container.querySelector('#boloFaca');
    if (facaEl) facaEl.classList.add(dentroDaZona ? 'bolo-acerto' : 'bolo-erro');

    setTimeout(() => {
      tentativaAtual++;
      if (tentativaAtual < TENTATIVAS) {
        travado = false;
        posicao = 0;
        direcao = 1;
        velocidade += 0.3;
        novaZona();
        render();
        idAnimacao = requestAnimationFrame(loop);
      } else {
        const mensagem = pontosTotais >= 350 ? 'Confeiteiro(a) de mão cheia! 🎂✨' : 'Precisa treinar mais um pouco no corte 😄';
        container.innerHTML = `
          <div class="jogo-final">
            <h2>${mensagem}</h2>
            <p>Pontuação final: <b>${pontosTotais}</b></p>
          </div>
          <div class="flap-fim">
            <button class="btn-jogar" id="boloJogarDeNovo">🔁 Jogar novamente</button>
          </div>
        `;
        finalizarJogo('Corta o Bolo', pontosTotais);
        container.querySelector('#boloJogarDeNovo').addEventListener('click', () => iniciarJogoBolo(container));
      }
    }, 650);
  }

  tentativaAtual = 0;
  pontosTotais = 0;
  posicao = 0;
  direcao = 1;
  velocidade = 1.6;
  novaZona();
  render();
  idAnimacao = requestAnimationFrame(loop);
}

  container.innerHTML = `

    <p class="flap-dica">Toque na tela (ou aperte espaço) no momento certo pra empilhar a caixa</p>
    <div id="presFim" class="flap-fim"></div>
  `;
  const canvas = container.querySelector('#presCanvas');
  const ctx = canvas.getContext('2d');
  const andarEl = container.querySelector('#presAndar');
  const W = canvas.width, H = canvas.height;

  const alturaCaixa = 34;
  const coresCaixa = ['#556B2F', '#C9A227', '#8B5E3C', '#7C8F4B'];
  let pilha = [{ x: W / 2 - 60, largura: 120, cor: coresCaixa[0] }];
  let atual = { x: 0, largura: 120, cor: coresCaixa[1], dir: 1, vel: 2.6 };
  atual.x = 0;
  let rolagem = 0;
  let andares = 0;
  let rodando = true;
  let idAnimacao = null;

  function novaCaixa() {
    const ultima = pilha[pilha.length - 1];
    atual = {
      x: 0,
      largura: ultima.largura,
      cor: coresCaixa[(pilha.length) % coresCaixa.length],
      dir: 1,
      vel: 2.4 + pilha.length * 0.18,
    };
  }
  novaCaixa();

  function desenhar() {
    ctx.clearRect(0, 0, W, H);
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#DCE8C8');
    grad.addColorStop(1, '#F5EFDD');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    pilha.forEach((caixa, i) => {
      const y = H - (i + 1) * alturaCaixa + rolagem;
      ctx.fillStyle = caixa.cor;
      ctx.fillRect(caixa.x, y, caixa.largura, alturaCaixa - 3);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(caixa.x + caixa.largura / 2, y);
      ctx.lineTo(caixa.x + caixa.largura / 2, y + alturaCaixa - 3);
      ctx.stroke();
    });

    if (rodando) {
      const y = H - (pilha.length + 1) * alturaCaixa + rolagem;
      ctx.fillStyle = atual.cor;
      ctx.fillRect(atual.x, y, atual.largura, alturaCaixa - 3);
    } else {
      ctx.fillStyle = 'rgba(43,43,34,0.72)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '22px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Torre caiu!', W / 2, H / 2 - 10);
      ctx.font = '16px sans-serif';
      ctx.fillText('Andares: ' + andares, W / 2, H / 2 + 20);
      ctx.textAlign = 'left';
    }
  }

  function loop() {
    if (!rodando) return;
    atual.x += atual.vel * atual.dir;
    if (atual.x + atual.largura >= W) { atual.x = W - atual.largura; atual.dir = -1; }
    if (atual.x <= 0) { atual.x = 0; atual.dir = 1; }
    desenhar();
    idAnimacao = requestAnimationFrame(loop);
  }

  function empilhar() {
    if (!rodando) return;
    const ultima = pilha[pilha.length - 1];
    const inicioSobra = Math.max(atual.x, ultima.x);
    const fimSobra = Math.min(atual.x + atual.largura, ultima.x + ultima.largura);
    const sobra = fimSobra - inicioSobra;

    if (sobra <= 6) { fimDeJogo(); return; }

    pilha.push({ x: inicioSobra, largura: sobra, cor: atual.cor });
    andares++;
    andarEl.textContent = andares;

    if (pilha.length > 6) rolagem += alturaCaixa;

    novaCaixa();
  }

  function fimDeJogo() {
    if (!rodando) return;
    rodando = false;
    if (idAnimacao) cancelAnimationFrame(idAnimacao);
    desenhar();
    document.removeEventListener('keydown', aoTeclar);
    const pontos = andares * 60;
    finalizarJogo('Empilhe os Presentes', pontos);

    const fimEl = container.querySelector('#presFim');
    fimEl.innerHTML = `<button class="btn-jogar" id="presJogarDeNovo">🔁 Jogar novamente</button>`;
    fimEl.querySelector('#presJogarDeNovo').addEventListener('click', () => iniciarJogoPresentes(container));
  }

  function aoTeclar(e) {
    if (e.code === 'Space') { e.preventDefault(); empilhar(); }
  }

  canvas.addEventListener('click', empilhar);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); empilhar(); }, { passive: false });
  document.addEventListener('keydown', aoTeclar);

  desenhar();
  idAnimacao = requestAnimationFrame(loop);
}

</script>
</body>
</html>

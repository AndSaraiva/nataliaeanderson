<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade do Casamento — Natália &amp; Anderson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --oliva:#556B2F;
    --oliva-clara:#7C8F4B;
    --oliva-escura:#2E3A18;
    --oliva-profundo:#1F2810;
    --dourado:#BFA15A;
    --dourado-claro:#D9BE7A;
    --dourado-suave:#E4C767;
    --madeira:#7A4F30;
    --madeira-clara:#9C6B45;
    --creme:#FAF6EE;
    --creme-claro:#FCF9F2;
    --oliva-claro:#F0EFE5;
    --branco:#FFFFFF;
    --carvao:#2B2B22;
    --carvao-suave:#5C5C4E;
    --linha:rgba(85,107,47,0.14);
    --linha-fina:rgba(85,107,47,0.08);
    --sombra:0 1px 2px rgba(43,43,34,0.04), 0 8px 24px -10px rgba(43,43,34,0.18);
    --sombra-hover:0 2px 4px rgba(43,43,34,0.05), 0 12px 28px -8px rgba(85,107,47,0.20), 0 24px 48px -12px rgba(43,43,34,0.18);
    --sombra-dourada:0 8px 20px -8px rgba(191,161,90,0.35);
    --raio-sm:10px;
    --raio-md:14px;
    --raio-lg:20px;
    --raio-xl:24px;
    --transicao:cubic-bezier(0.16, 1, 0.3, 1);
    --transicao-suave:cubic-bezier(0.4, 0, 0.2, 1);
    --max:1080px;
  }
  *{box-sizing:border-box;}
  html, body{
    overscroll-behavior-y: contain; /* impede o gesto de "puxar pra atualizar" recarregar a página sozinho */
  }
  body{
    margin:0; background:var(--creme); color:var(--carvao);
    font-family:'Jost',sans-serif; line-height:1.65; -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    letter-spacing:-0.005em;
  }
  h1,h2,h3{font-family:'Fraunces',serif; font-weight:500; margin:0 0 12px; letter-spacing:-0.01em; text-wrap:balance;}
  p{margin:0; letter-spacing:0.005em;}
  .arcade-bg{
    position:fixed; inset:0; z-index:-1;
    background: linear-gradient(rgba(250,243,228,0.88), rgba(250,243,228,0.88)), url('fundo.jpeg');
    background-size: cover;
    background-position: center;
  }
  .wrap{max-width:var(--max); margin:0 auto; padding:0 24px;}

  /* NAV */
  .arcade-nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 28px; max-width:var(--max); margin:0 auto;
  }
  .voltar-link{
    color:var(--oliva-escura); text-decoration:none; font-size:0.88rem; letter-spacing:0.02em;
    padding:6px 10px; border-radius:8px; transition:background .25s var(--transicao-suave);
  }
  .voltar-link:hover{background:rgba(85,107,47,0.08); text-decoration:none;}
  .arcade-brand{font-family:'Fraunces',serif; font-size:1.1rem; color:var(--oliva-escura); font-weight:500;}

  /* BOTÕES — padrão dourado magnético (igual ao index) */
  .btn-magnetic{
    position:relative; display:inline-flex; align-items:center; justify-content:center;
    padding:16px 34px; border-radius:999px; overflow:hidden;
    border:1px solid rgba(247,241,227,0.5);
    color:#F7F1E3; font-family:'Jost',sans-serif; font-size:0.9rem; letter-spacing:0.06em;
    text-decoration:none; cursor:pointer; background:rgba(247,241,227,0.06);
    transition:border-color .35s ease, background .35s ease, box-shadow .35s ease;
  }
  .btn-magnetic span{position:relative; z-index:1;}
  .btn-magnetic::before{
    content:''; position:absolute; inset:0; border-radius:inherit;
    background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.28), transparent 60%);
    opacity:0; transition:opacity .35s ease;
  }
  .btn-magnetic:hover::before{opacity:1;}
  .btn-magnetic:hover{border-color:#F7F1E3; box-shadow:0 0 30px rgba(247,241,227,0.22);}
  .btn-magnetic--fill{background:#B6883E; border-color:#B6883E; color:#241E0F;}
  .btn-magnetic--fill:hover{box-shadow:0 0 34px rgba(182,136,62,0.55);}

  .btn-arcade{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    color:#241E0F; border:none; border-radius:999px;
    padding:16px 36px; font-family:'Jost',sans-serif; font-size:0.95rem; font-weight:500; letter-spacing:0.04em;
    cursor:pointer;
  }
  .btn-voltar-jogo{
    background:#B6883E; border:1px solid #B6883E; color:#241E0F;
    border-radius:999px; padding:12px 22px; cursor:pointer;
  }

  /* PORTÃO DE ENTRADA */
  .portao{min-height:88vh; display:flex; align-items:center; justify-content:center; padding:32px 24px;}
  .portao-card{
    background:var(--oliva-claro); border:1px solid var(--linha-fina); border-radius:var(--raio-xl);
    padding:60px 48px; max-width:480px; width:100%; text-align:center;
    box-shadow:var(--sombra);
    position:relative; overflow:hidden;
  }
  .portao-card::before{
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg, transparent, var(--dourado), transparent);
    opacity:0.6;
  }
  .eyebrow-arcade{
    display:block; font-size:0.74rem; font-weight:500; letter-spacing:0.32em; text-transform:uppercase;
    color:var(--dourado); margin-bottom:14px;
  }
  .portao-card h1{font-size:2.2rem; color:var(--oliva-escura); font-weight:500; line-height:1.15;}
  .portao-card p{color:var(--carvao-suave); margin-top:14px; font-size:0.96rem; line-height:1.55;}
  #formEntrada{margin-top:32px; display:flex; flex-direction:column; gap:16px;}
  .autocomplete-wrap{position:relative;}
  .autocomplete-list{
    position:absolute; left:0; right:0; top:calc(100% + 8px); z-index:20;
    list-style:none; margin:0; padding:6px; max-height:220px; overflow-y:auto;
    background:var(--creme-claro); border:1px solid var(--linha); border-radius:var(--raio-md);
    box-shadow:var(--sombra); text-align:left;
  }
  .autocomplete-list li{
    padding:11px 14px; border-radius:8px; cursor:pointer; font-size:0.94rem;
    transition:background .15s var(--transicao-suave), transform .15s var(--transicao-suave);
  }
  .autocomplete-list li:hover{background:var(--areia-funda,#F3EEDE); transform:translateX(2px);}
  #formEntrada .autocomplete-list li{color:var(--carvao);}
  #nomeJogador{
    width:100%; padding:15px 18px; border-radius:var(--raio-md); border:1.5px solid var(--linha);
    background:var(--creme-claro); font-family:'Jost'; font-size:0.98rem; color:var(--carvao);
    transition:border-color .25s var(--transicao-suave), box-shadow .25s var(--transicao-suave), background .25s var(--transicao-suave);
  }
  #nomeJogador:focus{outline:none; border-color:var(--oliva-clara); background:var(--oliva-claro); box-shadow:0 0 0 4px rgba(124,143,75,0.12);}
  #formEntrada .erro-nome{
    color:var(--madeira); font-size:0.84rem; text-align:left; margin-top:-4px; font-weight:500;
  }

  /* ÁREA DO ARCADE */
  .area-arcade{max-width:var(--max); margin:0 auto; padding:10px 24px 110px;}
  .boas-vindas{
    text-align:center; font-family:'Fraunces',serif; font-size:1.35rem; font-weight:500;
    color:var(--oliva-escura); margin:18px 0 48px; letter-spacing:-0.01em;
    scroll-margin-top:84px;
  }
  .boas-vindas span{color:var(--dourado); font-weight:500;}

  .jogos-secao h2{text-align:center; color:var(--oliva-escura); margin-bottom:36px; font-size:1.5rem; font-weight:500;}
  .jogos-grid{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:28px;
  }
  @media (max-width:1024px){
    .jogos-grid{grid-template-columns:repeat(2, 1fr); gap:24px;}
  }
  @media (max-width:860px){
    .jogos-grid{grid-template-columns:repeat(2, 1fr);}
  }
  @media (max-width:520px){
    .jogos-grid{grid-template-columns:1fr; gap:20px;}
  }
  .card-jogo{
    position:relative; background:var(--oliva-claro); border:1px solid var(--linha-fina); border-radius:var(--raio-lg);
    padding:32px 26px 28px; text-align:center;
    box-shadow:var(--sombra);
    transition:transform .4s var(--transicao), box-shadow .4s var(--transicao), border-color .4s var(--transicao);
    will-change:transform;
    transform-style:preserve-3d;
  }
  .card-jogo::after{
    content:''; position:absolute; left:14px; right:14px; bottom:10px; height:2px;
    background:linear-gradient(90deg, transparent, var(--dourado), transparent);
    border-radius:2px; opacity:0; transform:scaleX(0.5);
    transition:opacity .4s var(--transicao), transform .4s var(--transicao);
  }
  .card-jogo:hover{
    transform:translateY(-6px);
    box-shadow:var(--sombra-hover);
    border-color:var(--linha);
  }
  .card-jogo:hover::after{opacity:1; transform:scaleX(1);}
  .card-jogo.em-breve{opacity:0.6; filter:grayscale(0.4);}
  .badge-em-breve{
    position:absolute; top:16px; right:16px; background:var(--madeira); color:var(--branco);
    font-size:0.66rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
    padding:5px 11px; border-radius:999px;
    box-shadow:0 2px 6px -2px rgba(122,79,48,0.4);
  }
  .card-icone{
    font-size:2.8rem; margin-bottom:14px; line-height:1;
    transition:transform .4s var(--transicao);
    display:inline-block;
  }
  .card-jogo:hover .card-icone{transform:scale(1.08) translateY(-2px);}
  .card-jogo h3{font-size:1.2rem; color:var(--oliva-escura); font-weight:500; margin-bottom:6px;}
  .card-jogo p{font-size:0.88rem; color:var(--carvao-suave); margin-top:10px; min-height:42px; line-height:1.5;}
  .card-melhor{font-size:0.82rem; color:var(--carvao-suave); margin-top:16px; padding-top:14px; border-top:1px dashed var(--linha);}
  .card-melhor b{color:var(--dourado); font-weight:600;}
  .btn-jogar{
    margin-top:18px; width:100%; padding:13px; border-radius:999px; border:1px solid #B6883E;
    background:#B6883E; color:#241E0F; font-family:'Jost'; font-size:0.9rem; font-weight:500; letter-spacing:0.03em;
    cursor:pointer; position:relative; overflow:hidden;
    transition:border-color .35s ease, background .35s ease, box-shadow .35s ease;
  }
  .btn-jogar span{position:relative; z-index:1;}
  .btn-jogar:hover:not(:disabled){box-shadow:0 0 34px rgba(182,136,62,0.55); border-color:#B6883E;}
  .btn-jogar:disabled{opacity:0.55; cursor:not-allowed; border-color:var(--linha);}
  .card-jogo.ja-jogou{opacity:0.55; filter:grayscale(0.5);}
  .card-jogo.ja-jogou:hover{transform:none; box-shadow:var(--sombra); border-color:var(--linha-fina);}
  .card-jogo.ja-jogou:hover::after{opacity:0;}

  /* ÁREA DE JOGO */
  .area-jogo{max-width:760px; margin:0 auto; padding:32px 24px 110px;}
  .btn-voltar-jogo{
    margin-bottom:22px; cursor:pointer;
  }
  #jogoConteudo{
    background:var(--oliva-claro); border:1px solid var(--linha-fina); border-radius:var(--raio-xl);
    padding:40px 36px; box-shadow:var(--sombra); text-align:center;
  }
  @media (max-width:520px){
    #jogoConteudo{padding:30px 22px;}
  }
  .jogo-cabecalho{margin-bottom:26px;}
  .jogo-cabecalho h2{color:var(--oliva-escura); font-size:1.5rem; font-weight:500;}
  .jogo-stats{display:flex; justify-content:center; gap:24px; font-size:0.85rem; color:var(--carvao-suave); margin-top:10px; flex-wrap:wrap;}
  .jogo-stats b{color:var(--oliva-escura); font-weight:600;}
  .jogo-final h2{color:var(--oliva-escura); font-size:1.6rem;}
  .jogo-final p{margin-top:12px; color:var(--carvao-suave); font-size:0.96rem;}

  /* QUIZ */
  .quiz-pergunta{font-size:1.15rem; font-family:'Fraunces',serif; font-weight:500; color:var(--carvao); margin-bottom:24px; line-height:1.4;}
  .quiz-opcoes{display:grid; gap:12px;}
  .quiz-opcao{
    padding:15px 18px; border-radius:var(--raio-md); border:1.5px solid var(--linha); background:var(--creme-claro);
    font-family:'Jost'; font-size:0.95rem; cursor:pointer; text-align:left; color:var(--carvao);
    transition:background .25s var(--transicao-suave), border-color .25s var(--transicao-suave), transform .25s var(--transicao);
  }
  .quiz-opcao:hover:not(:disabled){transform:translateX(5px); border-color:var(--oliva); background:var(--oliva-claro);}
  .quiz-opcao.selecionada{background:rgba(85,107,47,0.12); border-color:var(--oliva); font-weight:600; color:var(--oliva-escura);}
  .quiz-opcao.marcada{background:rgba(85,107,47,0.18); border-color:var(--oliva); color:var(--oliva-escura);}
  .quiz-opcao:disabled{cursor:default;}

  /* JOGO DA MEMÓRIA */
  .memoria-grid{
    display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; max-width:420px; margin:0 auto;
  }
  .carta-memoria{
    position:relative; aspect-ratio:1; border-radius:var(--raio-md); border:none; cursor:pointer;
    background:transparent; perspective:800px; padding:0;
  }
  .carta-frente, .carta-verso{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    border-radius:var(--raio-md); backface-visibility:hidden;
    transition:transform .6s var(--transicao);
    font-size:1.6rem; overflow:hidden;
  }
  .carta-frente{
    background:linear-gradient(150deg, var(--oliva) 0%, var(--oliva-escura) 100%);
    color:var(--dourado-suave); font-family:'Fraunces',serif;
    box-shadow:0 4px 12px -4px rgba(85,107,47,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .carta-verso{background:var(--oliva-claro); border:1px solid var(--linha-fina); transform:rotateY(180deg);}
  .carta-verso img{width:100%; height:100%; object-fit:cover;}
  .carta-memoria.virada .carta-frente{transform:rotateY(180deg);}
  .carta-memoria.virada .carta-verso{transform:rotateY(0deg);}
  .carta-memoria.encontrada .carta-verso{background:rgba(85,107,47,0.12); border-color:var(--oliva);}
  .carta-memoria.virada{transform:scale(0.97);}

  /* FLAPPY ALIANÇA */
  #flapCanvas{
    max-width:100%; border-radius:var(--raio-lg); border:1px solid var(--linha-fina);
    touch-action:none; cursor:pointer; display:block; margin:0 auto;
    box-shadow:var(--sombra);
  }
  .flap-dica{margin-top:16px; font-size:0.86rem; color:var(--carvao-suave); font-style:italic; transition:opacity .3s ease;}
  .flap-fim{margin-top:20px;}
  .flap-fim .btn-jogar{max-width:260px; margin:0 auto;}

  /* CORRIDA ATÉ O ALTAR */
  #corridaCanvas{
    max-width:100%; border-radius:var(--raio-lg); border:1px solid var(--linha-fina);
    touch-action:none; cursor:pointer; display:block; margin:0 auto;
    box-shadow:var(--sombra);
  }

  /* QUEBRA-CABEÇA */
  .quebra-tabuleiro{
    position:relative; width:min(360px, 100%); aspect-ratio:1;
    margin:8px auto 20px; background:var(--creme-claro);
    border:1px solid var(--linha-fina); border-radius:var(--raio-md); overflow:hidden;
    box-shadow:inset 0 0 0 1px rgba(85,107,47,0.04), var(--sombra);
    display:grid; grid-template-columns:repeat(4, 1fr); grid-template-rows:repeat(4, 1fr); gap:2px;
  }
  .quebra-peca{
    position:absolute; width:25%; height:25%; padding:2px; box-sizing:border-box;
  }
  .quebra-peca .peca-inner{
    position:relative; width:100%; height:100%; border-radius:6px;
    background-size:400% 400%; background-repeat:no-repeat; background-color:var(--oliva-claro);
    border:1px solid var(--linha-fina); cursor:grab; transition:transform .2s var(--transicao), box-shadow .2s var(--transicao);
  }
  .quebra-peca .peca-inner:hover{transform:scale(1.03); box-shadow:0 4px 12px -4px rgba(43,43,34,0.25);}
  .quebra-peca.selecionada .peca-inner{
    cursor:grabbing; box-shadow:0 0 0 2px var(--dourado), 0 8px 18px -4px rgba(43,43,34,0.4); transform:scale(1.05);
  }
  .quebra-peca.correta .peca-inner{
    border-color:var(--oliva); box-shadow:0 0 0 1px var(--oliva) inset; cursor:default;
  }
  .quebra-peca.correta .peca-inner:hover{transform:none;}
  .quebra-bancada{
    display:grid; grid-template-columns:repeat(4, 1fr); gap:8px;
    max-width:380px; margin:0 auto;
  }
  .quebra-slot{
    aspect-ratio:1; border-radius:8px; border:1px dashed var(--linha);
    background:rgba(191,161,90,0.08); position:relative;
    transition:background .2s var(--transicao), border-color .2s var(--transicao);
  }
  .quebra-slot.hover{background:rgba(191,161,90,0.20); border-color:var(--dourado);}
  .quebra-slot.errado{background:rgba(122,79,48,0.28); border-color:var(--madeira-clara);}
  .quebra-slot .peca-inner{
    position:absolute; inset:2px; border-radius:6px;
    background-size:400% 400%; background-repeat:no-repeat; background-color:var(--oliva-claro);
    border:1px solid var(--linha-fina); cursor:grab;
  }
  .quebra-slot-banc{cursor:pointer; transition:transform .2s var(--transicao), box-shadow .2s var(--transicao);}
  .quebra-slot-banc:hover{transform:scale(1.05); box-shadow:0 4px 14px -4px rgba(43,43,34,0.3);}
  .quebra-slot-banc.selecionada{background:rgba(191,161,90,0.32); border:2px solid var(--dourado); border-radius:8px; transform:scale(1.06); box-shadow:0 6px 20px -4px rgba(191,161,90,0.5);}
  .quebra-slot-banc.selecionada .peca-inner{border:2px solid var(--dourado); box-shadow:0 0 0 3px rgba(191,161,90,0.22);}
  .quebra-slot.correta .peca-inner{border-color:var(--oliva); box-shadow:0 0 0 1px var(--oliva) inset; cursor:default;}
  .quebra-peca-movendo{position:fixed; z-index:90; pointer-events:none; width:84px; height:84px;}
  .quebra-peca-movendo .peca-inner{
    position:absolute; inset:0; border-radius:8px; border:2px solid var(--dourado);
    background-size:400% 400%; background-repeat:no-repeat; background-color:var(--oliva-claro);
    box-shadow:0 16px 32px -8px rgba(43,43,34,0.45);
  }
  .quebra-dica{margin-top:14px; font-size:0.86rem; color:var(--carvao-suave); font-style:italic;}
  .quebra-tabuleiro.tab-pedindo{animation:tabPedePeca .3s var(--transicao);}
  @keyframes tabPedePeca{0%,100%{box-shadow:inset 0 0 0 1px rgba(85,107,47,0.05);}50%{box-shadow:inset 0 0 0 3px var(--dourado), var(--sombra-dourada);}}

  /* EMPILHE OS PRESENTES */
  #presCanvas{
    max-width:100%; border-radius:var(--raio-lg); border:1px solid var(--linha-fina);
    touch-action:none; cursor:pointer; display:block; margin:0 auto;
    box-shadow:var(--sombra);
  }

  /* CONFETES */
  .confete-container{position:fixed; inset:0; pointer-events:none; z-index:80; overflow:hidden;}
  .confete-item{
    position:absolute; top:-12px; width:8px; height:14px; border-radius:2px;
    animation-name:confeteQueda; animation-timing-function:ease-in;
  }
  @keyframes confeteQueda{
    0%{transform:translateY(0) rotate(0deg); opacity:1;}
    100%{transform:translateY(105vh) rotate(540deg); opacity:0.2;}
  }

  /* BANNER DE FESTA DE RECORDE */
  .festa-banner{
    position:fixed; left:50%; top:38%; transform:translate(-50%,-50%) scale(0.6);
    z-index:90; pointer-events:none; text-align:center;
    background:linear-gradient(135deg, rgba(255,255,255,0.96), rgba(245,239,221,0.96));
    border:3px solid var(--oliva, #556B2F);
    border-radius:20px; padding:22px 34px;
    box-shadow:0 18px 50px rgba(0,0,0,0.28);
    opacity:0; animation:festaEntra .4s ease-out forwards, festaSai .5s ease-in 2.8s forwards;
  }
  .festa-banner .festa-emoji{font-size:2.6rem; line-height:1; display:block; margin-bottom:6px;}
  .festa-banner .festa-tit{font-size:1.5rem; font-weight:800; color:#556B2F; letter-spacing:.5px;}
  .festa-banner .festa-sub{font-size:.92rem; color:#7A4F30; margin-top:4px;}
  @keyframes festaEntra{0%{opacity:0; transform:translate(-50%,-50%) scale(0.6);}60%{transform:translate(-50%,-50%) scale(1.08);}100%{opacity:1; transform:translate(-50%,-50%) scale(1);}}
  @keyframes festaSai{to{opacity:0; transform:translate(-50%,-50%) scale(0.9);}}

  /* REVEAL ANIMATIONS */
  .reveal{opacity:0; transform:translateY(24px); animation:fadeUp .7s var(--transicao) forwards;}
  .jogos-grid .card-jogo.reveal:nth-child(1){animation-delay:0.05s;}

  @keyframes fadeUp{to{opacity:1; transform:translateY(0);}}

  /* ACESSIBILIDADE: respeita prefers-reduced-motion */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}

  @media (max-width:640px){

</style>

<div id="confeteContainer" class="confete-container" aria-hidden="true"></div>

<script>
// ===================================================================
// Arcade do Casamento — Natália & Anderson
// ===================================================================

// Mesma planilha/Apps Script já usado no RSVP do site principal
const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbypL1nyxU6hNOtw8brrhWlynwM96YEjbYXqsn1JfS9W2_X8ZLZHeJG4Zb-bYAwHgwUO/exec';

let jogadorAtual = '';
let listaConvidados = [];     // ['Anderson', 'Andre', ...] — todos da planilha
let jogosJaJogados = [];      // ['Quiz dos Noivos'] — jogos que ESTA pessoa já jogou (vem do backend)
let ultimoPersonagemCorrida = 0; // alterna entre noivo e noiva a cada partida da "Corrida até o Altar"
const melhoresSessao = {}; // melhor pontuação de CADA jogo, só nesta sessão do navegador
const recordesPlanilha = {}; // melhor pontuação de CADA jogo vinda da planilha (recorde geral)

// Carrega a lista oficial de convidados assim que o Arcade abre
carregarConvidados();

// -------------------------------------------------------------
// MICRO-INTERAÇÃO: tilt 3D sutil nos cards (apenas desktop, com mouse)
// Acessível: respeita prefers-reduced-motion e desativa em telas touch
// -------------------------------------------------------------
(function iniciarTiltCards(){
  // Detecta se é dispositivo touch (sem hover confiável) — desativa
  if (window.matchMedia('(hover: none)').matches) return;
  // Respeita preferência do usuário por menos movimento
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  let rafId = null, currentCard = null, targetX = 0, targetY = 0, currentX = 0, currentY = 0;

  function aplicarTransform(card){
    card.style.transform = `perspective(900px) rotateX(${currentY}deg) rotateY(${currentX}deg) translateY(-6px)`;
  }

  function animar(){
    currentX += (targetX - currentX) * 0.15;
    currentY += (targetY - currentY) * 0.15;
    if (currentCard && (Math.abs(targetX - currentX) > 0.05 || Math.abs(targetY - currentY) > 0.05)){
      aplicarTransform(currentCard);
      rafId = requestAnimationFrame(animar);
    } else if (currentCard) {
      // Reseta suavemente quando sai
      currentCard.style.transform = '';
      rafId = null;
    }
  }

  // Observa o grid: cada vez que os cards são renderizados, liga o tilt
  const observer = new MutationObserver(() => {
    document.querySelectorAll('.card-jogo:not(.ja-jogou):not(.em-breve)').forEach(card => {
      if (card.dataset.tiltReady) return;
      card.dataset.tiltReady = '1';
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;  // 0 a 1
        const y = (e.clientY - rect.top) / rect.height;  // 0 a 1
        currentCard = card;
        targetX = (x - 0.5) * 6;   // -3 a 3 graus
        targetY = (0.5 - y) * 4;   // -2 a 2 graus
        if (!rafId) rafId = requestAnimationFrame(animar);
      });
      card.addEventListener('mouseleave', () => {
        targetX = 0; targetY = 0;
        currentCard = card;
        if (!rafId) rafId = requestAnimationFrame(animar);
        setTimeout(() => { if (currentCard === card) currentCard = null; }, 250);
      });
    });
  });
  const grid = document.getElementById('jogosGrid');
  if (grid) observer.observe(grid, { childList: true });
})();

// -------------------------------------------------------------
// PERGUNTAS DO QUIZ — PERSONALIZE aqui com fatos reais do casal
// "correta" é o índice (0,1,2,3) da opção certa dentro de "opcoes"
// -------------------------------------------------------------
const perguntasQuiz = [
  { pergunta: 'Em que cidade será o casamento?', opcoes: ['Recife', 'Fortaleza', 'Salvador', 'João Pessoa'], correta: 1 },
  { pergunta: 'Qual a data do grande dia?', opcoes: ['18 de junho de 2027', '10 de maio de 2027', '25 de dezembro de 2026', '14 de fevereiro de 2027'], correta: 0 },
  { pergunta: 'Onde Anderson fez o pedido de casamento?', opcoes: ['Numa praia', 'Numa estufa de orquídeas', 'Num restaurante', 'Num show'], correta: 1 },
  // PERSONALIZE as 7 perguntas abaixo com fatos reais de vocês dois:
  { pergunta: 'Em que ano Natália e Anderson começaram a namorar? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
  { pergunta: 'Qual é a comida favorita do casal? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
  { pergunta: 'Qual o time de futebol do Anderson? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
  { pergunta: 'Onde foi o primeiro encontro do casal? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
  { pergunta: 'Qual o hobby favorito da Natália? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
  { pergunta: 'Qual música não pode faltar na festa? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
  { pergunta: 'Qual o sonho de viagem do casal? [PERSONALIZE]', opcoes: ['Opção A', 'Opção B', 'Opção C', 'Opção D'], correta: 0 },
];

// -------------------------------------------------------------
// LISTA DE JOGOS
// -------------------------------------------------------------
const jogosDisponiveis = [
  { id: 'quiz', nome: 'Quiz dos Noivos', icone: '💌', desc: '10 perguntas sobre o casal. Responda rápido pra ganhar bônus!', ativo: true, iniciar: iniciarJogoQuiz },
  { id: 'memoria', nome: 'Jogo da Memória', icone: '🧠', desc: 'Encontre os pares com o menor número de movimentos.', ativo: true, iniciar: iniciarJogoMemoria },
  { id: 'flappy', nome: 'Flappy Aliança', icone: '💍', desc: 'Desvie dos obstáculos e voe o mais longe possível.', ativo: true, iniciar: iniciarJogoFlappy },
  { id: 'corrida', nome: 'Corrida até o Altar', icone: '🏃‍♂️🏃‍♀️', desc: 'Pule os obstáculos e corra o mais longe possível até o altar.', ativo: true, iniciar: iniciarJogoCorrida },
  { id: 'quebra', nome: 'Quebra-Cabeça', icone: '🧩', desc: 'Monte a foto do casal arrastando as peças para o lugar certo.', ativo: true, iniciar: iniciarJogoQuebraCabeca },
  { id: 'presentes', nome: 'Empilhe os Presentes', icone: '🎁', desc: 'Empilhe as caixas sem deixar a torre cair.', ativo: true, iniciar: iniciarJogoPresentes },
];

// -------------------------------------------------------------
// CARREGAR LISTA DE CONVIDADOS (mesma fonte do RSVP do site principal)
// -------------------------------------------------------------
async function carregarConvidados() {
  try {
    const res = await fetch(URL_APPS_SCRIPT);
    const dados = await res.json();
    listaConvidados = (dados || []).map(item => String(item.nome || '').trim()).filter(Boolean);
  } catch (e) {
    console.error('Não foi possível carregar a lista de convidados', e);
    listaConvidados = [];
  }
}

// -------------------------------------------------------------
// CARREGAR RECORDES GERAIS DA PLANILHA (maior pontuação por jogo)
// -------------------------------------------------------------
async function carregarRecordes() {
  try {
    const res = await fetch(URL_APPS_SCRIPT + '?acao=recordes');
    const data = await res.json();
    if (data && data.recordes) {
      Object.assign(recordesPlanilha, data.recordes);
    }
  } catch (e) {
    console.error('Não foi possível carregar os recordes da planilha', e);
  }
}

// -------------------------------------------------------------
// AUTOCOMPLETE DO NOME
// -------------------------------------------------------------
const inputNome = document.getElementById('nomeJogador');
const sugestoesEl = document.getElementById('nome-sugestoes-arcade');
const erroEl = document.getElementById('erroNome');

function mostrarSugestoes() {
  const termo = inputNome.value.trim().toLowerCase();
  sugestoesEl.innerHTML = '';
  // Esconde a mensagem de erro assim que a pessoa volta a digitar
  if (erroEl) { erroEl.hidden = true; erroEl.textContent = ''; }
  if (!termo) { sugestoesEl.hidden = true; return; }

  const resultados = listaConvidados
    .filter(n => n.toLowerCase().includes(termo))
    .sort((a, b) => a.localeCompare(b, 'pt-BR'))
    .slice(0, 6);

  if (resultados.length === 0) { sugestoesEl.hidden = true; return; }

  resultados.forEach(nome => {
    const li = document.createElement('li');
    li.textContent = nome;
    li.addEventListener('mousedown', (e) => {
      // mousedown em vez de click pra disparar antes do blur do input
      e.preventDefault();
      inputNome.value = nome;
      sugestoesEl.hidden = true;
    });
    sugestoesEl.appendChild(li);
  });
  sugestoesEl.hidden = false;
}

inputNome.addEventListener('input', mostrarSugestoes);
inputNome.addEventListener('focus', mostrarSugestoes);
inputNome.addEventListener('blur', () => {
  // espera 150ms pra não fechar antes do mousedown da sugestão
  setTimeout(() => { sugestoesEl.hidden = true; }, 150);
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('.autocomplete-wrap')) sugestoesEl.hidden = true;
});

// -------------------------------------------------------------
// SUBMIT DO PORTÃO — valida nome na lista e busca jogos já jogados
// -------------------------------------------------------------
document.getElementById('formEntrada').addEventListener('submit', async (e) => {
  e.preventDefault();
  const nome = inputNome.value.trim();
  if (!nome) return;

  // 1) Confere se o nome está na lista oficial
  const bate = listaConvidados.some(n => n.toLowerCase() === nome.toLowerCase());
  if (!bate) {
    erroEl.textContent = 'Nome não encontrado. Escolha um nome da lista de convidados.';
    erroEl.hidden = false;
    return;
  }

  // 2) Busca no backend quais jogos essa pessoa já jogou (defesa em profundidade)
  try {
    const res = await fetch(URL_APPS_SCRIPT + '?acao=ranking&nome=' + encodeURIComponent(nome));
    const data = await res.json();
    jogosJaJogados = (data && data.jogos) || [];
  } catch (err) {
    console.error('Não foi possível consultar o ranking, seguindo sem ele', err);
    jogosJaJogados = [];
  }

  // 3) Entra no Arcade
  jogadorAtual = nome;
  document.getElementById('nomeExibido').textContent = nome;
  document.getElementById('portao').hidden = true;
  document.getElementById('areaArcade').hidden = false;
  // Busca os recordes da planilha ANTES de desenhar os cards pela 1ª vez (evita o "piscar")
  await carregarRecordes();
  renderizarCards();
  // Sobe o "Bem-vindo, <nome>! Boa sorte" para o topo da tela (após tudo carregar)
  document.getElementById('boasVindasTopo').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// -------------------------------------------------------------
// CARDS DOS JOGOS
// -------------------------------------------------------------
function renderizarCards() {
  const grid = document.getElementById('jogosGrid');
  grid.innerHTML = jogosDisponiveis.map(j => {
    // Trava SÓ pro Quiz dos Noivos. Memória e Flappy podem jogar quantas vezes quiser.
    const jaJogou = j.nome === 'Quiz dos Noivos' && jogosJaJogados.includes(j.nome);
    const classeExtra = j.ativo ? (jaJogou ? 'ja-jogou' : '') : 'em-breve';
    const badge = !j.ativo ? '<span class="badge-em-breve">Em breve</span>'
                 : jaJogou ? '<span class="badge-em-breve" style="background:var(--oliva);">Já jogou</span>'
                 : '';
    const textoBtn = !j.ativo ? 'Em breve' : (jaJogou ? '✅ Já jogou' : 'Jogar');
    const rodape = jaJogou
      ? 'Status: <b style="color:var(--oliva-escura);">já jogou nesta conta</b>'
      : (j.nome === 'Quiz dos Noivos'
          ? ''
          : `Recorde: <b>${recordesPlanilha[j.nome] != null ? recordesPlanilha[j.nome] : '—'}</b>`);
    return `
      <div class="card-jogo ${classeExtra} reveal">
        ${badge}
        <div class="card-icone">${j.icone}</div>
        <h3>${j.nome}</h3>
        <p>${j.desc}</p>
        <div class="card-melhor">${rodape}</div>
        <button class="btn-jogar btn-magnetic btn-magnetic--fill" data-id="${j.id}" data-magnetic ${(!j.ativo || jaJogou) ? 'disabled' : ''}><span>${textoBtn}</span></button>
      </div>
    `;
  }).join('');
  grid.querySelectorAll('.btn-jogar').forEach(btn => {
    btn.addEventListener('click', () => {
      const jogo = jogosDisponiveis.find(j => j.id === btn.dataset.id);
      if (jogo && jogo.ativo && !btn.disabled) abrirJogo(jogo);
    });
  });
}

async function abrirJogo(jogo) {
  pararMusicaAtiva();   // garante que a música do jogo anterior pare ao trocar de jogo
  // Checagem extra de segurança: pergunta de novo ao backend se essa pessoa já jogou
  try {
    const res = await fetch(URL_APPS_SCRIPT + '?acao=ranking&nome=' + encodeURIComponent(jogadorAtual));
    const data = await res.json();
    const jogos = (data && data.jogos) || [];
    // Trava de defesa em profundidade SÓ pro Quiz dos Noivos
    if (jogo.nome === 'Quiz dos Noivos' && jogos.includes('Quiz dos Noivos')) {
      // Atualiza a trava local e avisa
      jogosJaJogados = jogos;
      renderizarCards();
      alert('Você já jogou o Quiz dos Noivos. Ele só pode ser jogado uma vez por pessoa.');
      return;
    }
    jogosJaJogados = jogos; // sincroniza (caso a pessoa tenha jogado de outro dispositivo)
  } catch (err) {
    console.error('Falha ao checar ranking antes de abrir o jogo', err);
    // Se a rede falhou, deixa entrar — o doPost ainda recusa com ja_jogou se for o caso
  }

  document.getElementById('areaArcade').hidden = true;
  document.getElementById('areaJogo').hidden = false;
  document.getElementById('areaJogo').scrollIntoView({ behavior: 'auto', block: 'start' });
  jogo.iniciar(document.getElementById('jogoConteudo'));
}

document.getElementById('voltarArcade').addEventListener('click', voltarParaArcade);
function voltarParaArcade() {
  pararMusicaAtiva();   // para a música do jogo ao voltar para o Arcade
  document.getElementById('areaJogo').hidden = true;
  document.getElementById('areaArcade').hidden = false;
  renderizarCards();
  // Sobe o "Bem-vindo, <nome>! Boa sorte" para o topo da tela (igual ao Entrar)
  document.getElementById('boasVindasTopo').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// -------------------------------------------------------------
// FINALIZAR JOGO — envia pontuação, dispara confete se for recorde
// -------------------------------------------------------------
function finalizarJogo(jogo, pontos) {
  const eQuiz = jogo === 'Quiz dos Noivos';

  // O Quiz dos Noivos é sigiloso: NÃO tem recorde, NÃO atualiza placares e
  // NÃO dispara confete/festa. Apenas grava a pontuação (necessário p/ travar a 2ª tentativa).
  if (!eQuiz) {
    const recordeAnterior = melhoresSessao[jogo] || 0;
    const bateuRecordeSessao = pontos > recordeAnterior;
    if (bateuRecordeSessao) melhoresSessao[jogo] = pontos;

    // Recorde GERAL (planilha): dispara a festa em todos os jogos, menos o Quiz.
    const recordeGeral = recordesPlanilha[jogo] || 0;
    const bateuRecordeGeral = pontos > 0 && pontos > recordeGeral;
    if (bateuRecordeGeral) {
      recordesPlanilha[jogo] = pontos;   // atualiza o recorde geral localmente
      festaRecorde(jogo, pontos);
    } else if (pontos > 0 && bateuRecordeSessao) {
      dispararConfete();
    }
  }

  // Pontuação 0 não é gravada na planilha (evita linha "inútil" pra cada tentativa zerada) —
  // EXCETO o Quiz dos Noivos, que precisa sempre gravar algo pra travar a segunda tentativa.
  if (pontos > 0 || eQuiz) {
    enviarPontuacao(jogadorAtual, jogo, pontos);
  }
}

async function enviarPontuacao(nome, jogo, pontos) {
  try {
    const res = await fetch(URL_APPS_SCRIPT, {
      method: 'POST',
      body: JSON.stringify({ acao: 'pontuar', nome, jogo, pontos })
    });
    const data = await res.json().catch(() => ({ ok: false }));
    if (data && data.ok === false && data.motivo === 'ja_jogou') {
      // Backend confirmou que essa pessoa já jogou o Quiz. Trava local e volta pro Arcade.
      if (!jogosJaJogados.includes(jogo)) jogosJaJogados.push(jogo);
      const container = document.getElementById('jogoConteudo');
      if (container) {
        container.innerHTML = `
          <div class="jogo-final">
            <h2>Você já jogou o Quiz dos Noivos</h2>
            <p>O Quiz só pode ser jogado uma vez por pessoa. Voltando ao Arcade...</p>
          </div>`;
      }
      setTimeout(() => voltarParaArcade(), 1800);
      return;
    }
  } catch (e) {
    console.error('Não foi possível salvar a pontuação', e);
  }
}

// -------------------------------------------------------------
// CONFETE
// -------------------------------------------------------------
function dispararConfete() {
  const cont = document.getElementById('confeteContainer');
  const cores = ['#556B2F', '#BFA15A', '#FFFFFF', '#7A4F30'];
  for (let i = 0; i < 44; i++) {
    const c = document.createElement('span');
    c.className = 'confete-item';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = cores[Math.floor(Math.random() * cores.length)];
    c.style.animationDuration = (Math.random() * 1.4 + 1.6) + 's';
    c.style.animationDelay = (Math.random() * 0.3) + 's';
    cont.appendChild(c);
    setTimeout(() => c.remove(), 3500);
  }
}

// Festa especial: confete intenso + banner "NOVO RECORDE!" (todos os jogos menos o Quiz)
function festaRecorde(jogo, pontos) {
  const cont = document.getElementById('confeteContainer');
  const cores = ['#556B2F', '#BFA15A', '#D33A2C', '#FFFFFF', '#7A4F30', '#E9C46A'];
  for (let i = 0; i < 110; i++) {
    const c = document.createElement('span');
    c.className = 'confete-item';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = cores[Math.floor(Math.random() * cores.length)];
    c.style.animationDuration = (Math.random() * 1.4 + 1.4) + 's';
    c.style.animationDelay = (Math.random() * 0.5) + 's';
    cont.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
  const banner = document.createElement('div');
  banner.className = 'festa-banner';
  banner.innerHTML = `
    <span class="festa-emoji">🎉🎁🎊</span>
    <div class="festa-tit">NOVO RECORDE!</div>
    <div class="festa-sub">${jogo} — ${pontos} pontos</div>`;
  document.body.appendChild(banner);
  setTimeout(() => banner.remove(), 3400);
}

// Música de fundo por jogo: cria <audio loop> + botão 🔊 mute flutuante.
// O áudio e o botão são anexados ao <body> (position:fixed) para NÃO serem apagados
// quando o container do jogo recebe um novo innerHTML (ex.: re-render do Quiz).
let musicaAtiva = null;   // referência da música do jogo em execução
function tocarMusicaJogo(container, arquivo) {
  const audio = document.createElement('audio');
  audio.src = arquivo;
  audio.loop = true;
  audio.volume = 0.4;
  audio.preload = 'auto';
  document.body.appendChild(audio);

  const btn = document.createElement('button');
  btn.type = 'button';
  btn.textContent = '🔊';
  btn.setAttribute('aria-label', 'Desligar música');
  btn.style.cssText = 'position:fixed; right:14px; bottom:14px; z-index:95; width:42px; height:42px; border-radius:50%; border:none; background:rgba(85,107,47,0.9); color:#fff; font-size:1.2rem; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,0.3);';
  document.body.appendChild(btn);

  let ligado = true;
  const tentarTocar = () => { audio.play().catch(() => {}); };
  tentarTocar();
  // redesperta o play caso o navegador tenha bloqueado o autoplay inicial
  const reanimar = () => { if (ligado) tentarTocar(); };
  document.addEventListener('pointerdown', reanimar, { once: true });

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    ligado = !ligado;
    if (ligado) { btn.textContent = '🔊'; audio.play().catch(() => {}); }
    else { btn.textContent = '🔇'; audio.pause(); }
  });

  // guarda referência global para poder parar ao sair do jogo
  musicaAtiva = {
    audio,
    parar: () => {
      try { audio.pause(); audio.currentTime = 0; } catch (e) {}
      try { btn.remove(); } catch (e) {}
      try { audio.remove(); } catch (e) {}
      try { document.removeEventListener('pointerdown', reanimar); } catch (e) {}
      musicaAtiva = null;
    }
  };
  return musicaAtiva;
}

// para a música de fundo ativa (chamado ao sair do jogo ou ao abrir outro)
function pararMusicaAtiva() {
  if (musicaAtiva && typeof musicaAtiva.parar === 'function') {
    musicaAtiva.parar();
  }
  musicaAtiva = null;
}

// ===================================================================
// JOGO 1 — QUIZ DOS NOIVOS
// ===================================================================
function iniciarJogoQuiz(container) {
  tocarMusicaJogo(container, './quiz.mp3');
  let atual = 0, pontos = 0;
  const inicio = Date.now();

  function render() {
    if (atual >= perguntasQuiz.length) {
      const segundos = Math.floor((Date.now() - inicio) / 1000);
      const bonus = Math.max(0, 200 - segundos * 2);
      const total = pontos + bonus;
      const mensagem = total >= 800
        ? 'Você conhece muito bem os noivos! 💛'
        : 'Acho que você precisa conversar mais com eles 😄';
      container.innerHTML = `
        <div class="jogo-final">
          <h2>${mensagem}</h2>
        </div>`;
      finalizarJogo('Quiz dos Noivos', total);
      return;
    }
    const p = perguntasQuiz[atual];
    container.innerHTML = `
      <div class="jogo-cabecalho">
        <h2>💌 Quiz dos Noivos</h2>
        <div class="jogo-stats"><span>Pergunta ${atual + 1} de ${perguntasQuiz.length}</span></div>
      </div>
      <p class="quiz-pergunta">${p.pergunta}</p>
      <div class="quiz-opcoes">
        ${p.opcoes.map((o, i) => `<button class="quiz-opcao" data-i="${i}"><span style="position:relative;z-index:1;">${o}</span></button>`).join('')}
      </div>
    `;
    container.querySelectorAll('.quiz-opcao').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = Number(btn.dataset.i);
        const certa = i === p.correta;
        // Sigiloso: não revela acerto/erro. Apenas destaca a opção marcada (verde)
        // e bloqueia as demais, sem mostrar qual era a correta nem pintar erro de vermelho.
        container.querySelectorAll('.quiz-opcao').forEach((b) => { b.disabled = true; });
        btn.classList.add('marcada');
        if (certa) pontos += 100;
        setTimeout(() => { atual++; render(); }, 700);
      });
    });
  }
  render();
}

// ===================================================================
// JOGO 2 — JOGO DA MEMÓRIA
// ===================================================================
function iniciarJogoMemoria(container) {
  tocarMusicaJogo(container, './memoria.mp3');
  const simbolos = ['./foto1.jpeg', './foto2.jpeg', './foto3.jpeg', './foto4.jpeg', './foto5.jpeg', './foto6.jpeg'];
  const cartas = embaralhar([...simbolos, ...simbolos]).map((s, i) => ({ id: i, simbolo: s, virada: false, encontrada: false }));
  let primeira = null, segunda = null, travado = false, movimentos = 0, pares = 0;
  const inicio = Date.now();

  container.innerHTML = `
    <div class="jogo-cabecalho">
      <h2>🧠 Jogo da Memória</h2>
      <div class="jogo-stats"><span>Movimentos: <b id="memMovimentos">0</b></span><span>Tempo: <b id="memTempo">0s</b></span><span>Recorde: <b>${recordesPlanilha['Jogo da Memória'] != null ? recordesPlanilha['Jogo da Memória'] : '—'}</b></span></div>
    </div>
    <div class="memoria-grid" id="memoriaGrid"></div>
  `;
  const grid = container.querySelector('#memoriaGrid');
  const movEl = container.querySelector('#memMovimentos');
  const tempoEl = container.querySelector('#memTempo');

  const timerInt = setInterval(() => {
    tempoEl.textContent = Math.floor((Date.now() - inicio) / 1000) + 's';
  }, 1000);

  cartas.forEach(carta => {
    const el = document.createElement('button');
    el.className = 'carta-memoria';
    el.innerHTML = `<span class="carta-frente">?</span><span class="carta-verso"><img src="${carta.simbolo}" alt="Foto de Natália e Anderson"></span>`;
    el.addEventListener('click', () => {
      if (travado || carta.virada || carta.encontrada) return;
      carta.virada = true;
      el.classList.add('virada');
      if (!primeira) { primeira = { carta, el }; return; }
      segunda = { carta, el };
      movimentos++; movEl.textContent = movimentos;
      travado = true;
      setTimeout(() => {
        if (primeira.carta.simbolo === segunda.carta.simbolo) {
          primeira.el.classList.add('encontrada');
          segunda.el.classList.add('encontrada');
          primeira.carta.encontrada = segunda.carta.encontrada = true;
          pares++;
          if (pares === simbolos.length) {
            clearInterval(timerInt);
            const segundos = Math.floor((Date.now() - inicio) / 1000);
            const pontos = Math.max(100, 1000 - movimentos * 10 - segundos * 5);
            setTimeout(() => {
              container.innerHTML = `
                <div class="jogo-final">
                  <h2>Parabéns, vocês combinam mesmo! 💍</h2>
                  <p>Completou em <b>${movimentos}</b> movimentos e <b>${segundos}s</b><br>Pontuação: <b>${pontos}</b></p>
                </div>
                <div class="flap-fim">
                  <button class="btn-jogar btn-magnetic btn-magnetic--fill" id="memJogarDeNovo" data-magnetic><span>🔁 Jogar novamente</span></button>
                </div>`;
              finalizarJogo('Jogo da Memória', pontos);
              container.querySelector('#memJogarDeNovo').addEventListener('click', () => iniciarJogoMemoria(container));
            }, 500);
          }
        } else {
          primeira.el.classList.remove('virada');
          segunda.el.classList.remove('virada');
          primeira.carta.virada = segunda.carta.virada = false;
        }
        primeira = null; segunda = null; travado = false;
      }, 700);
    });
    grid.appendChild(el);
  });
}

function embaralhar(arr) {
  return arr.map(v => [Math.random(), v]).sort((a, b) => a[0] - b[0]).map(v => v[1]);
}

// ===================================================================
// JOGO 3 — FLAPPY ALIANÇA (estilo flappybird.io, com tema de casamento)
// ===================================================================
function iniciarJogoFlappy(container) {
  container.innerHTML = `
    <div class="jogo-cabecalho">
      <h2>💍 Flappy Aliança</h2>
      <div class="jogo-stats"><span>Pontos: <b id="flapPontos">0</b></span><span>Recorde: <b id="flapRecorde">0</b></span></div>
    </div>
    <div style="position:relative; max-width:360px; margin:0 auto;">
      <canvas id="flapCanvas" width="360" height="480" style="display:block; width:100%; height:auto;"></canvas>
      <div id="flapTapHint" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:rgba(255,255,255,0.9); font-family:'Fraunces',serif; font-size:1.1rem; text-shadow:0 2px 8px rgba(0,0,0,0.4); pointer-events:none; animation:pulseDica 1.4s ease-in-out infinite; letter-spacing:0.02em;">Toque para começar</div>
    </div>
    <p class="flap-dica" id="flapDica">Toque na tela (ou aperte espaço) pra fazer a aliança voar</p>
    <div id="flapFim" class="flap-fim"></div>
    <style>
      @keyframes pulseDica{0%,100%{opacity:0.6; transform:translate(-50%, -50%) scale(1);}50%{opacity:1; transform:translate(-50%, -50%) scale(1.05);}}
    </style>
  `;
  const canvas = container.querySelector('#flapCanvas');
  const ctx = canvas.getContext('2d');
  const pontosEl = container.querySelector('#flapPontos');
  const recordeEl = container.querySelector('#flapRecorde');
  const tapHintEl = container.querySelector('#flapTapHint');
  const dicaEl = container.querySelector('#flapDica');
  const W = canvas.width, H = canvas.height;

  tocarMusicaJogo(container, './Flappy.mp3');

  // --- Constantes do jogo ---
  const GROUND_H = 70;                // altura do chão
  const PIPE_W = 58;                  // largura do cano
  const PIPE_GAP = 150;               // espaço entre canos (vertical)
  const PIPE_SPEED_BASE = 2.4;        // velocidade inicial
  const PIPE_SPEED_MAX = 3.6;         // velocidade máxima
  const PIPE_SPACING = 195;           // distância horizontal entre canos
  const GRAVIDADE = 0.45;
  const FORCA_VOO = -7.6;
  const MAX_VY = 11;                  // velocidade terminal de queda
  const ANEL_X = 80;                  // posição X fixa do anel
  const ANEL_RAIO = 16;               // raio visual
  const HITBOX_RAIO = 13;             // raio de colisão (menor que visual = generoso)

  // --- Estado do jogo ---
  let anel = { x: ANEL_X, y: H / 2, vy: 0, rotacao: 0, frame: 0 };
  let canos = [];                     // {x, topo, passou}
  let nuvens = [];                    // {x, y, escala, vel}
  let grama = [];                     // tufinhos de grama
  let pontos = 0;
  // Recorde vem exclusivamente da planilha (maior pontuação já registrada por qualquer convidado)
  let recorde = recordesPlanilha['Flappy Aliança'] != null ? recordesPlanilha['Flappy Aliança'] : 0;
  let iniciado = false;               // virou true após primeiro flap
  let gameOver = false;
  let frame = 0;
  let flash = 0;                      // flash branco ao marcar ponto (0-1)
  let shake = 0;                      // tremor de tela ao bater
  let particulas = [];                // brilhos ao bater
  let loopId = null;
  let velocidade = PIPE_SPEED_BASE;
  let ultimoCanoX = W;                // controla o espaçamento entre canos

  recordeEl.textContent = recorde;

  // Inicializa nuvens (parallax: 3 camadas)
  for (let i = 0; i < 6; i++) {
    nuvens.push({ x: Math.random() * W, y: 30 + Math.random() * 160, escala: 0.6 + Math.random() * 0.7, vel: 0.15 + Math.random() * 0.25 });
  }
  // Inicializa tufinhos de grama
  for (let i = 0; i < 18; i++) {
    grama.push({ x: i * (W / 18) + Math.random() * 20 });
  }

  function criarCano() {
    const margem = 60;
    const centro = margem + Math.random() * (H - GROUND_H - margem * 2 - PIPE_GAP);
    canos.push({ x: W + 20, centro, passou: false });
  }

  // === DESENHO ===
  function desenharCenario() {
    // Céu: degradê azul pastel (estilo clássico)
    const sky = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
    sky.addColorStop(0, '#7EC0EE');
    sky.addColorStop(0.6, '#A6D5F2');
    sky.addColorStop(1, '#D6EAF7');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H - GROUND_H);

    // Nuvens em parallax (3 camadas de velocidade)
    nuvens.forEach(n => {
      const cx = n.x;
      const cy = n.y;
      const s = n.escala;
      ctx.fillStyle = `rgba(255,255,255,${0.55 + s * 0.25})`;
      // nuvem = 4 círculos sobrepostos
      ctx.beginPath();
      ctx.arc(cx, cy, 18 * s, 0, Math.PI * 2);
      ctx.arc(cx + 18 * s, cy - 6 * s, 14 * s, 0, Math.PI * 2);
      ctx.arc(cx + 32 * s, cy, 18 * s, 0, Math.PI * 2);
      ctx.arc(cx + 16 * s, cy + 8 * s, 14 * s, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function desenharCano(c) {
    const topoH = c.centro - PIPE_GAP / 2;
    const baseY = c.centro + PIPE_GAP / 2;

    // Cano superior (desce do topo até o gap)
    const gradCima = ctx.createLinearGradient(c.x, 0, c.x + PIPE_W, 0);
    gradCima.addColorStop(0, '#3E4E22');
    gradCima.addColorStop(0.4, '#7C8F4B');
    gradCima.addColorStop(0.6, '#7C8F4B');
    gradCima.addColorStop(1, '#3E4E22');
    ctx.fillStyle = gradCima;
    ctx.fillRect(c.x, 0, PIPE_W, topoH);

    // Borda dourada no topo do cano (sutil, elegante)
    ctx.fillStyle = '#BFA15A';
    ctx.fillRect(c.x - 2, 0, PIPE_W + 4, 6);
    ctx.fillStyle = '#D9BE7A';
    ctx.fillRect(c.x - 2, 6, PIPE_W + 4, 2);

    // "Boca" do cano superior (mais larga)
    ctx.fillStyle = gradCima;
    ctx.fillRect(c.x - 4, topoH - 24, PIPE_W + 8, 24);
    ctx.fillStyle = '#BFA15A';
    ctx.fillRect(c.x - 6, topoH - 26, PIPE_W + 12, 4);
    ctx.fillStyle = '#D9BE7A';
    ctx.fillRect(c.x - 6, topoH - 22, PIPE_W + 12, 2);

    // Cano inferior
    ctx.fillStyle = gradCima;
    ctx.fillRect(c.x, baseY, PIPE_W, H - GROUND_H - baseY);

    // Borda dourada embaixo do cano inferior
    ctx.fillStyle = '#BFA15A';
    ctx.fillRect(c.x - 2, H - GROUND_H - 6, PIPE_W + 4, 6);
    ctx.fillStyle = '#D9BE7A';
    ctx.fillRect(c.x - 2, H - GROUND_H - 8, PIPE_W + 4, 2);

    // "Boca" do cano inferior
    ctx.fillStyle = gradCima;
    ctx.fillRect(c.x - 4, baseY, PIPE_W + 8, 24);
    ctx.fillStyle = '#BFA15A';
    ctx.fillRect(c.x - 6, baseY + 24, PIPE_W + 12, 4);
    ctx.fillStyle = '#D9BE7A';
    ctx.fillRect(c.x - 6, baseY + 22, PIPE_W + 12, 2);
  }

  function desenharAnel() {
    ctx.save();
    ctx.translate(anel.x, anel.y);
    // Rotação baseada na velocidade vertical: sobe = roda pra cima, cai = roda pra baixo
    const angulo = Math.max(-0.5, Math.min(1.2, anel.vy / 14));
    ctx.rotate(angulo);
    // Efeito de "pulsar" no flap (frame 0-3 = escala maior)
    const pulsa = anel.frame > 0 ? 1 + Math.sin(anel.frame * 0.8) * 0.12 : 1;
    ctx.scale(pulsa, pulsa);

    // Sombra suave embaixo da aliança
    ctx.fillStyle = 'rgba(43,43,34,0.18)';
    ctx.beginPath();
    ctx.ellipse(2, 4, ANEL_RAIO + 2, ANEL_RAIO - 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Aliança: círculo oco (anel) com brilho
    // Anel externo (borda escura)
    ctx.strokeStyle = '#7A4F30';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.arc(0, 0, ANEL_RAIO, 0, Math.PI * 2);
    ctx.stroke();
    // Anel interno (dourado)
    ctx.strokeStyle = '#E4C767';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, ANEL_RAIO, 0, Math.PI * 2);
    ctx.stroke();
    // Brilho (highlight)
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(-ANEL_RAIO * 0.4, -ANEL_RAIO * 0.4, ANEL_RAIO * 0.5, Math.PI * 1.1, Math.PI * 1.7);
    ctx.stroke();
    // Pedra (no topo do anel, simulando diamante)
    ctx.fillStyle = '#D9BE7A';
    ctx.beginPath();
    ctx.moveTo(0, -ANEL_RAIO - 3);
    ctx.lineTo(-3, -ANEL_RAIO - 7);
    ctx.lineTo(3, -ANEL_RAIO - 7);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#FCF9F2';
    ctx.beginPath();
    ctx.moveTo(0, -ANEL_RAIO - 4);
    ctx.lineTo(-1.5, -ANEL_RAIO - 6);
    ctx.lineTo(1.5, -ANEL_RAIO - 6);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function desenharChao() {
    // Faixa do chão
    const groundGrad = ctx.createLinearGradient(0, H - GROUND_H, 0, H);
    groundGrad.addColorStop(0, '#7C8F4B');
    groundGrad.addColorStop(0.15, '#556B2F');
    groundGrad.addColorStop(1, '#3E4E22');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);

    // Listras do chão (perspectiva)
    ctx.fillStyle = 'rgba(43,43,34,0.18)';
    for (let i = 0; i < W; i += 24) {
      ctx.fillRect(i, H - GROUND_H, 1, GROUND_H);
    }

    // Tufinhos de grama no topo do chão
    ctx.fillStyle = '#7C8F4B';
    grama.forEach(g => {
      ctx.beginPath();
      ctx.moveTo(g.x, H - GROUND_H);
      ctx.lineTo(g.x + 4, H - GROUND_H - 6);
      ctx.lineTo(g.x + 8, H - GROUND_H);
      ctx.closePath();
      ctx.fill();
    });
  }

  function desenharParticulas() {
    particulas.forEach(p => {
      ctx.fillStyle = `rgba(228,199,103,${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function desenharHUD() {
    // Score grande no centro superior
    if (iniciado && !gameOver) {
      ctx.fillStyle = '#FFFFFF';
      ctx.strokeStyle = 'rgba(43,43,34,0.5)';
      ctx.lineWidth = 4;
      ctx.font = 'bold 52px "Fraunces", serif';
      ctx.textAlign = 'center';
      ctx.strokeText(pontos, W / 2, 70);
      ctx.fillText(pontos, W / 2, 70);
      ctx.textAlign = 'left';
    }

    // Flash de ponto (soma 1)
    if (flash > 0) {
      ctx.fillStyle = `rgba(228,199,103,${flash})`;
      ctx.font = 'bold 24px "Jost", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('+1', ANEL_X + 30, anel.y - 20);
      ctx.textAlign = 'left';
    }

    // Tela de game over
    if (gameOver) {
      ctx.fillStyle = 'rgba(43,43,34,0.65)';
      ctx.fillRect(0, 0, W, H);

      // Card central semi-transparente
      ctx.fillStyle = 'rgba(250,246,238,0.95)';
      const cardW = 220, cardH = 130, cardX = (W - cardW) / 2, cardY = (H - cardH) / 2;
      ctx.beginPath();
      // Cantos arredondados
      const r = 16;
      ctx.moveTo(cardX + r, cardY);
      ctx.arcTo(cardX + cardW, cardY, cardX + cardW, cardY + cardH, r);
      ctx.arcTo(cardX + cardW, cardY + cardH, cardX, cardY + cardH, r);
      ctx.arcTo(cardX, cardY + cardH, cardX, cardY, r);
      ctx.arcTo(cardX, cardY, cardX + cardW, cardY, r);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#BFA15A';
      ctx.font = '500 12px "Jost", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W / 2, cardY + 30);

      ctx.fillStyle = '#2E3A18';
      ctx.font = '500 32px "Fraunces", serif';
      ctx.fillText(pontos, W / 2, cardY + 68);

      ctx.fillStyle = '#5C5C4E';
      ctx.font = '13px "Jost", sans-serif';
      ctx.fillText(`Recorde: ${recorde}`, W / 2, cardY + 92);

      ctx.fillStyle = '#7A4F30';
      ctx.font = '12px "Jost", sans-serif';
      ctx.fillText('Toque para reiniciar', W / 2, cardY + 115);
      ctx.textAlign = 'left';
    }
  }

  function desenhar() {
    ctx.clearRect(0, 0, W, H);

    // Aplica tremor de tela ao bater
    let offsetX = 0, offsetY = 0;
    if (shake > 0) {
      offsetX = (Math.random() - 0.5) * shake * 2;
      offsetY = (Math.random() - 0.5) * shake * 2;
      ctx.save();
      ctx.translate(offsetX, offsetY);
    }

    desenharCenario();
    canos.forEach(desenharCano);
    desenharChao();
    desenharParticulas();
    desenharAnel();
    desenharHUD();

    if (shake > 0) ctx.restore();
  }

  // === LÓGICA ===
  function voar() {
    if (gameOver) {
      // Reinicia o jogo ao tocar após game over
      reiniciar();
      return;
    }
    anel.vy = FORCA_VOO;
    anel.frame = 1;
    if (!iniciado) {
      iniciado = true;
      if (tapHintEl) tapHintEl.style.opacity = '0';
      if (dicaEl) dicaEl.style.opacity = '0.5';
      // Cria o primeiro cano
      criarCano();
      ultimoCanoX = W;
    }
  }

  function fimDeJogo() {
    if (gameOver) return;
    gameOver = true;
    shake = 8;
    // Cria partículas douradas no ponto de impacto
    for (let i = 0; i < 14; i++) {
      const ang = Math.random() * Math.PI * 2;
      const vel = 1.5 + Math.random() * 3;
      particulas.push({
        x: anel.x,
        y: anel.y,
        vx: Math.cos(ang) * vel,
        vy: Math.sin(ang) * vel - 1,
        r: 1.5 + Math.random() * 2,
        alpha: 1,
        vida: 60
      });
    }
    // Atualiza o recorde exibido (o valor definitivo continua sendo o da planilha)
    if (pontos > recorde) {
      recorde = pontos;
      recordesPlanilha['Flappy Aliança'] = recorde;
      recordeEl.textContent = recorde;
    }
    // Grava a pontuação na planilha de ranking
    finalizarJogo('Flappy Aliança', pontos);
  }

  function reiniciar() {
    anel = { x: ANEL_X, y: H / 2, vy: 0, rotacao: 0, frame: 0 };
    canos = [];
    particulas = [];
    pontos = 0;
    gameOver = false;
    iniciado = false;
    velocidade = PIPE_SPEED_BASE;
    frame = 0;
    flash = 0;
    shake = 0;
    ultimoCanoX = W;
    pontosEl.textContent = 0;
    if (tapHintEl) tapHintEl.style.opacity = '1';
    if (dicaEl) dicaEl.style.opacity = '1';
  }

  function loop() {
    if (gameOver) {
      // Continua animando partículas e tremor mesmo após game over
      if (shake > 0) { shake *= 0.85; if (shake < 0.3) shake = 0; }
      particulas.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.15;
        p.vida--;
        p.alpha = p.vida / 60;
      });
      particulas = particulas.filter(p => p.vida > 0);
      desenhar();
      loopId = requestAnimationFrame(loop);
      return;
    }

    frame++;
    if (anel.frame > 0) anel.frame++;
    if (anel.frame > 6) anel.frame = 0;

    // Física do anel
    anel.vy += GRAVIDADE;
    if (anel.vy > MAX_VY) anel.vy = MAX_VY;
    anel.y += anel.vy;

    // Move nuvens (parallax lento)
    nuvens.forEach(n => {
      n.x -= n.vel;
      if (n.x < -50) {
        n.x = W + 30;
        n.y = 30 + Math.random() * 160;
        n.escala = 0.6 + Math.random() * 0.7;
      }
    });

    // Move tufinhos de grama
    if (iniciado) {
      grama.forEach(g => { g.x -= velocidade; });
      if (grama[0].x < -10) {
        grama.push({ x: grama[grama.length - 1].x + (W / 18) });
        grama.shift();
      }
    }

    // Aceleração progressiva sutil
    if (iniciado) {
      velocidade = Math.min(PIPE_SPEED_MAX, PIPE_SPEED_BASE + frame * 0.0015);
    }

    // Spawn de canos com espaçamento constante
    if (iniciado) {
      canos.forEach(c => { c.x -= velocidade; });
      const ultimoCano = canos[canos.length - 1];
      if (!ultimoCano || ultimoCano.x < W - PIPE_SPACING) {
        criarCano();
      }
      canos = canos.filter(c => c.x > -PIPE_W - 10);

      // Pontuação
      canos.forEach(c => {
        if (!c.passou && c.x + PIPE_W < anel.x) {
          c.passou = true;
          pontos++;
          flash = 1;
          pontosEl.textContent = pontos;
        }
      });
    }

    // Decai flash
    if (flash > 0) flash -= 0.025;
    if (shake > 0) { shake *= 0.85; if (shake < 0.3) shake = 0; }

    // === Colisão AABB (com hitbox generosa) ===
    // Chão / teto
    if (anel.y + HITBOX_RAIO >= H - GROUND_H) {
      anel.y = H - GROUND_H - HITBOX_RAIO;
      fimDeJogo();
    }
    if (anel.y - HITBOX_RAIO <= 0) {
      anel.y = HITBOX_RAIO;
      anel.vy = 1;
    }

    // Canos
    if (iniciado) {
      for (const c of canos) {
        if (anel.x + HITBOX_RAIO > c.x && anel.x - HITBOX_RAIO < c.x + PIPE_W) {
          const topo = c.centro - PIPE_GAP / 2;
          const base = c.centro + PIPE_GAP / 2;
          if (anel.y - HITBOX_RAIO < topo || anel.y + HITBOX_RAIO > base) {
            fimDeJogo();
            break;
          }
        }
      }
    }

    desenhar();
    loopId = requestAnimationFrame(loop);
  }

  // === CONTROLES ===
  function aoTeclar(e) {
    if (e.code === 'Space') { e.preventDefault(); voar(); }
  }

  function aoClicar(e) {
    e.preventDefault();
    voar();
  }

  canvas.addEventListener('mousedown', aoClicar);
  canvas.addEventListener('touchstart', aoClicar, { passive: false });
  document.addEventListener('keydown', aoTeclar);

  // Cleanup quando sair do jogo
  const observerSair = new MutationObserver(() => {
    if (container.querySelector('#flapCanvas') !== canvas) {
      document.removeEventListener('keydown', aoTeclar);
      if (loopId) cancelAnimationFrame(loopId);
      observerSair.disconnect();
    }
  });
  observerSair.observe(container, { childList: true, subtree: true });

  // Botão "jogar de novo" também fica no DOM (escondido até game over)
  const fimEl = container.querySelector('#flapFim');
  fimEl.innerHTML = `<button class="btn-jogar btn-magnetic btn-magnetic--fill" id="flapJogarDeNovo" data-magnetic style="display:none;"><span>🔁 Jogar novamente</span></button>`;
  fimEl.querySelector('#flapJogarDeNovo').addEventListener('click', () => {
    reiniciar();
  });
  // Mostra o botão quando der game over
  const observerGameOver = new MutationObserver(() => {
    if (gameOver) {
      fimEl.querySelector('#flapJogarDeNovo').style.display = 'inline-block';
      observerGameOver.disconnect();
    }
  });
  observerGameOver.observe(container, { childList: true, subtree: true, attributes: true });

  // Desenho inicial (estado "toque para começar")
  desenhar();
  loopId = requestAnimationFrame(loop);
}

// ===================================================================
// JOGO 4 — CORRIDA ATÉ O ALTAR (estilo endless runner cinematográfico)
// ===================================================================
function iniciarJogoCorrida(container) {
  // Na primeira entrada mantém o personagem atual (a alternância acontece a cada derrota em reiniciar())
  let tipoPersonagem = ultimoPersonagemCorrida; // 0 = noivo, 1 = noiva

  const ehNoiva = tipoPersonagem === 1;
  let rotuloPersonagem = ehNoiva ? 'Noiva' : 'Noivo';
  let emojiPersonagem = ehNoiva ? '👰' : '🤵';

  // Atualiza labels do personagem (usado também ao alternar em reiniciar)
  function atualizarPersonagem() {
    const eNoiva = tipoPersonagem === 1;
    rotuloPersonagem = eNoiva ? 'Noiva' : 'Noivo';
    emojiPersonagem = eNoiva ? '👰' : '🤵';
    if (vezEl) vezEl.textContent = emojiPersonagem + ' Agora é a vez da ' + rotuloPersonagem.toLowerCase() + '!';
    const stats = container.querySelector('.jogo-stats');
    if (stats) {
      stats.children[0].textContent = emojiPersonagem + ' ' + rotuloPersonagem;
    }
    if (dicaEl) dicaEl.textContent = emojiPersonagem + ' Toque na tela (ou aperte espaço) pra fazer a ' + rotuloPersonagem.toLowerCase() + ' pular os obstáculos';
  }

  container.innerHTML = `
    <div class="jogo-cabecalho">
      <h2>🏃 Corrida até o Altar</h2>
      <div class="jogo-stats">
        <span style="color:var(--oliva-escura);">${emojiPersonagem} ${rotuloPersonagem}</span>
        <span>Distância: <b id="corridaPontos">0</b>m</span>
        <span>Recorde: <b id="corridaRecorde">0</b>m</span>
      </div>
    </div>
    <div style="text-align:center;">
      <div class="corrida-vez" id="corridaVez">${emojiPersonagem} Agora é a vez da ${rotuloPersonagem.toLowerCase()}!</div>
    </div>
    <div class="corrida-barra-wrap" title="Progresso até o altar">
      <div class="corrida-barra" id="corridaBarra"></div>
    </div>
    <div style="position:relative; max-width:380px; margin:14px auto 0;">
      <canvas id="corridaCanvas" width="380" height="260" style="display:block; width:100%; height:auto; border-radius:18px;"></canvas>
      <div id="corridaTapHint" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:rgba(255,255,255,0.95); font-family:'Fraunces',serif; font-size:1.05rem; text-shadow:0 2px 8px rgba(0,0,0,0.5); pointer-events:none; animation:pulseDicaCorrida 1.4s ease-in-out infinite; letter-spacing:0.02em;">Toque para pular</div>
    </div>
    <p class="flap-dica" id="corridaDica">${emojiPersonagem} Toque na tela (ou aperte espaço) pra fazer a ${rotuloPersonagem.toLowerCase()} pular os obstáculos</p>
    <div id="corridaFim" class="flap-fim"></div>
    <style>
      @keyframes pulseDicaCorrida{0%,100%{opacity:0.6; transform:translate(-50%, -50%) scale(1);}50%{opacity:1; transform:translate(-50%, -50%) scale(1.05);}}
    </style>
  `;
  const canvas = container.querySelector('#corridaCanvas');
  const ctx = canvas.getContext('2d');
  const pontosEl = container.querySelector('#corridaPontos');
  const recordeEl = container.querySelector('#corridaRecorde');
  const vezEl = container.querySelector('#corridaVez');
  const barraEl = container.querySelector('#corridaBarra');
  const tapHintEl = container.querySelector('#corridaTapHint');
  const dicaEl = container.querySelector('#corridaDica');
  const W = canvas.width, H = canvas.height;

  tocarMusicaJogo(container, './Corrida.mp3');

  // --- Constantes ---
  const GROUND_H = 50;
  const CHAO_Y = H - GROUND_H;
  const GRAVIDADE = 0.65;
  const FORCA_PULO = -11.5;
  const VEL_BASE = 2.6;          // ← mais suave no início
  const VEL_MAX = 5.5;           // ← não fica absurdo
  const VEL_INC = 0.0012;        // ← mais gradual
  const VEL_AQUECIMENTO = 200;   // ← metros antes de acelerar
  const DIST_MIN_OBST = 220;     // ← mais espaço entre obstáculos
  const DIST_VARIACAO = 120;     // ← variação aleatória
  const HITBOX_LARG = 28;
  const HITBOX_ALTURA = 40;
  const PERS_X = 55;

  // --- Estado ---
  let pers = { x: PERS_X, y: CHAO_Y, vy: 0, noChao: true, frame: 0 };
  let obstaculos = [];   // {x, tipo, larg, altura}
  let passaros = [];     // silhuetas voando ao longe
  let flores = [];       // flores/arbustos laterais
  let confetes = [];     // confetes caindo (ambiente de festa)
  let gramaDetalhes = [];
  let altar = { x: W + 50, escala: 0.5 }; // altar se aproximando
  let distancia = 0;
  // Recorde vem exclusivamente da planilha (maior distância já registrada por qualquer convidado)
  let recorde = recordesPlanilha['Corrida até o Altar'] != null ? recordesPlanilha['Corrida até o Altar'] : 0;
  let gameOver = false;
  let foiRecorde = false;
  let iniciou = false;
  let frame = 0;
  let velocidade = VEL_BASE;
  let particulas = [];   // poeira dos pés
  let confeteFesta = []; // confete de comemoração ao bater recorde
  let shake = 0;         // tremor ao bater
  let loopId = null;
  let obstDistancia = 0; // controla distância desde o último obstáculo

  recordeEl.textContent = recorde;

  // Inicializa pássaros distantes (silhuetas pequenas voando)
  for (let i = 0; i < 3; i++) {
    passaros.push({ x: Math.random() * W, y: 30 + Math.random() * 50, vel: 0.4 + Math.random() * 0.3, frame: Math.random() * 10 });
  }
  // Inicializa flores/arbustos laterais
  for (let i = 0; i < 12; i++) {
    flores.push({ x: i * 45 + Math.random() * 30, tipo: Math.floor(Math.random() * 3) });
  }
  // Confetes caindo do céu (ambiente de festa)
  for (let i = 0; i < 8; i++) {
    confetes.push({ x: Math.random() * W, y: Math.random() * CHAO_Y, vel: 0.3 + Math.random() * 0.4, cor: ['#BFA15A','#D9A5A5','#FCF9F2','#7C8F4B'][i % 4], rot: Math.random() * 6.28, rotVel: (Math.random() - 0.5) * 0.05 });
  }
  // Detalhes de grama no chão
  for (let i = 0; i < 25; i++) {
    gramaDetalhes.push({ x: i * 18 + Math.random() * 8 });
  }

  // === CENÁRIO — PÔR DO SOL ROMÂNTICO ===
  function desenharCeu() {
    // Degradê sunset: dourado quente no topo → rosa-sóbrio → oliva-claro no horizonte
    const sky = ctx.createLinearGradient(0, 0, 0, CHAO_Y);
    sky.addColorStop(0, '#E8B47C');      // dourado quente
    sky.addColorStop(0.3, '#E89B7A');    // pêssego
    sky.addColorStop(0.6, '#C97B7B');    // rosa-sóbrio
    sky.addColorStop(0.85, '#9C8B6E');   // oliva-rosado
    sky.addColorStop(1, '#7C8F4B');      // oliva no horizonte
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, CHAO_Y);
  }

  function desenharSol() {
    // Sol grande no fundo com halo
    const solX = W * 0.7;
    const solY = CHAO_Y * 0.55;
    const solR = 38;

    // Halo externo (3 camadas)
    ctx.fillStyle = 'rgba(228,199,103,0.12)';
    ctx.beginPath();
    ctx.arc(solX, solY, solR * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(228,199,103,0.20)';
    ctx.beginPath();
    ctx.arc(solX, solY, solR * 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(252,249,242,0.25)';
    ctx.beginPath();
    ctx.arc(solX, solY, solR * 1.2, 0, Math.PI * 2);
    ctx.fill();

    // Sol (gradiente)
    const solGrad = ctx.createRadialGradient(solX, solY, 0, solX, solY, solR);
    solGrad.addColorStop(0, '#FCF9F2');
    solGrad.addColorStop(0.5, '#E4C767');
    solGrad.addColorStop(1, '#BFA15A');
    ctx.fillStyle = solGrad;
    ctx.beginPath();
    ctx.arc(solX, solY, solR, 0, Math.PI * 2);
    ctx.fill();

    // Brilho central
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(solX - 8, solY - 8, solR * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  function desenharPassaros() {
    // Silhuetas de pássaros distantes voando (parallax lento)
    passaros.forEach(p => {
      const batida = Math.sin(p.frame * 0.3) * 3;
      ctx.strokeStyle = 'rgba(43,43,34,0.4)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      // Corpo em "M" — duas asas
      ctx.moveTo(p.x - 4, p.y + batida);
      ctx.quadraticCurveTo(p.x - 2, p.y - 2 + batida, p.x, p.y + batida);
      ctx.quadraticCurveTo(p.x + 2, p.y - 2 + batida, p.x + 4, p.y + batida);
      ctx.stroke();
    });
  }

  function desenharConfetes() {
    // Confetes caindo do céu (ambiente de festa)
    confetes.forEach(c => {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rot);
      ctx.fillStyle = c.cor;
      ctx.fillRect(-2, -3, 4, 6);
      ctx.restore();
    });
  }

  function desenharSerra() {
    // Silhueta de serra distante (camada única — mais clean)
    ctx.fillStyle = 'rgba(85,107,47,0.6)';
    ctx.beginPath();
    ctx.moveTo(0, CHAO_Y);
    for (let x = 0; x <= W; x += 20) {
      const off = (x + frame * 0.2) % 60;
      ctx.lineTo(x, CHAO_Y - 35 - Math.sin((x + off) * 0.04) * 18);
    }
    ctx.lineTo(W, CHAO_Y);
    ctx.closePath();
    ctx.fill();

    // Camada de vegetação (arbustos) no horizonte, na frente da serra
    ctx.fillStyle = 'rgba(62,78,34,0.7)';
    ctx.beginPath();
    ctx.moveTo(0, CHAO_Y);
    for (let x = 0; x <= W; x += 15) {
      const off = (x + frame * 0.5) % 40;
      ctx.lineTo(x, CHAO_Y - 12 - Math.sin((x + off) * 0.08) * 6);
    }
    ctx.lineTo(W, CHAO_Y);
    ctx.closePath();
    ctx.fill();
  }

  function desenharFlores() {
    flores.forEach(f => {
      const baseY = CHAO_Y;
      if (f.tipo === 0) {
        // Flor rosa
        ctx.fillStyle = '#556B2F';
        ctx.fillRect(f.x + 1, baseY - 6, 1, 6);
        ctx.fillStyle = '#D9A5A5';
        for (let i = 0; i < 4; i++) {
          const a = i * Math.PI / 2;
          ctx.beginPath();
          ctx.arc(f.x + 1 + Math.cos(a) * 2, baseY - 8 + Math.sin(a) * 2, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = '#BFA15A';
        ctx.beginPath();
        ctx.arc(f.x + 1, baseY - 8, 1, 0, Math.PI * 2);
        ctx.fill();
      } else if (f.tipo === 1) {
        // Flor branca
        ctx.fillStyle = '#556B2F';
        ctx.fillRect(f.x + 1, baseY - 7, 1, 7);
        ctx.fillStyle = '#FCF9F2';
        ctx.beginPath();
        ctx.arc(f.x + 1, baseY - 8, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#E4C767';
        ctx.beginPath();
        ctx.arc(f.x + 1, baseY - 8, 1, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Arbusto
        ctx.fillStyle = '#7C8F4B';
        ctx.beginPath();
        ctx.arc(f.x + 2, baseY - 4, 5, 0, Math.PI * 2);
        ctx.arc(f.x + 6, baseY - 4, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    });
  }

  function desenharChao() {
    // Grama
    const ground = ctx.createLinearGradient(0, CHAO_Y, 0, H);
    ground.addColorStop(0, '#7C8F4B');
    ground.addColorStop(0.3, '#556B2F');
    ground.addColorStop(1, '#3E4E22');
    ctx.fillStyle = ground;
    ctx.fillRect(0, CHAO_Y, W, GROUND_H);

    // Tufinhos de grama
    ctx.fillStyle = '#7C8F4B';
    gramaDetalhes.forEach(g => {
      ctx.beginPath();
      ctx.moveTo(g.x, CHAO_Y);
      ctx.lineTo(g.x + 2, CHAO_Y - 4);
      ctx.lineTo(g.x + 4, CHAO_Y);
      ctx.closePath();
      ctx.fill();
    });

    // Passarela/ tapete ao altar (visual elegante e moderno)
    const runnerY = CHAO_Y + GROUND_H - 14;
    const runnerH = 14;
    // Sombra sob o tapete
    ctx.fillStyle = 'rgba(43,43,34,0.18)';
    ctx.fillRect(0, runnerY + runnerH - 2, W, 3);
    // Tapete creme
    const tapete = ctx.createLinearGradient(0, runnerY, 0, runnerY + runnerH);
    tapete.addColorStop(0, '#FCF9F2');
    tapete.addColorStop(1, '#E4D8B8');
    ctx.fillStyle = tapete;
    ctx.fillRect(0, runnerY, W, runnerH);
    // Bordas douradas
    ctx.fillStyle = '#BFA15A';
    ctx.fillRect(0, runnerY, W, 1.5);
    ctx.fillRect(0, runnerY + runnerH - 1.5, W, 1.5);
    // Pétalas rosas espalhadas (movimento de corrida)
    const petalas = ['#D9A5A5', '#C98C8C', '#E4C0C0'];
    for (let i = 0; i < 14; i++) {
      const base = (i * 27) % W;
      const x = (base - frame * velocidade * 0.4) % W;
      const px = x < 0 ? x + W : x;
      ctx.fillStyle = petalas[i % petalas.length];
      ctx.beginPath();
      ctx.ellipse(px, runnerY + 4 + (i % 3) * 3, 2.2, 1.4, i * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function desenharAltar() {
    if (!altar) return;
    const ax = altar.x;
    const escala = altar.escala;
    const baseY = CHAO_Y;

    // Altar só aparece quando está no canvas
    if (ax < -60 || ax > W + 60) return;

    ctx.save();
    ctx.translate(ax, baseY);
    ctx.scale(escala, escala);

    // Base do altar (degraus)
    ctx.fillStyle = '#FCF9F2';
    ctx.fillRect(-22, -10, 44, 10);
    ctx.fillStyle = '#E4D8B8';
    ctx.fillRect(-26, -2, 52, 4);

    // Colunas
    ctx.fillStyle = '#FCF9F2';
    ctx.fillRect(-18, -50, 6, 40);
    ctx.fillRect(12, -50, 6, 40);

    // Arco superior
    ctx.fillStyle = '#FCF9F2';
    ctx.beginPath();
    ctx.arc(0, -50, 18, Math.PI, 0);
    ctx.lineTo(18, -50);
    ctx.lineTo(18, -46);
    ctx.lineTo(-18, -46);
    ctx.lineTo(-18, -50);
    ctx.closePath();
    ctx.fill();

    // Flores no topo do arco
    ctx.fillStyle = '#D9A5A5';
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.arc(i * 8, -66, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // Folhas
    ctx.fillStyle = '#556B2F';
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.ellipse(i * 6, -64, 2.5, 1.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Coração dourado no centro do arco
    ctx.fillStyle = '#BFA15A';
    ctx.beginPath();
    ctx.moveTo(0, -54);
    ctx.bezierCurveTo(-4, -58, -8, -54, -4, -50);
    ctx.bezierCurveTo(0, -47, 4, -50, 8, -54);
    ctx.bezierCurveTo(4, -58, 0, -58, 0, -54);
    ctx.closePath();
    ctx.fill();

    // Vela/luz no topo
    ctx.fillStyle = '#FCF9F2';
    ctx.fillRect(-1, -70, 2, 4);
    ctx.fillStyle = '#BFA15A';
    ctx.beginPath();
    ctx.arc(0, -71, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // === PERSONAGEM (noiva ou noivo desenhados em canvas) ===
  function desenharNoiva(x, y, frameAnim) {
    // frameAnim: 0-3 para variação de "passo"
    const bobY = frameAnim % 2 === 0 ? 0 : 1;
    const pernaOffset = frameAnim % 2 === 0 ? 0 : 1;

    // Sombra
    ctx.fillStyle = 'rgba(43,43,34,0.2)';
    ctx.beginPath();
    ctx.ellipse(x, CHAO_Y - 2, 12, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Vestido (corpo) — silhueta em vestido
    ctx.fillStyle = '#FCF9F2';
    ctx.beginPath();
    ctx.moveTo(x - 8, y - 20);
    ctx.lineTo(x - 14, y - 5);
    ctx.lineTo(x - 16, y);
    ctx.lineTo(x + 16, y);
    ctx.lineTo(x + 14, y - 5);
    ctx.lineTo(x + 8, y - 20);
    ctx.closePath();
    ctx.fill();

    // Detalhe do corpete (cintura)
    ctx.fillStyle = '#E4D8B8';
    ctx.fillRect(x - 7, y - 14, 14, 3);

    // Faixa dourada (detalhe)
    ctx.fillStyle = '#BFA15A';
    ctx.fillRect(x - 6, y - 12, 12, 1);

    // Cabeça
    ctx.fillStyle = '#F5DDC0';
    ctx.beginPath();
    ctx.arc(x, y - 25, 5, 0, Math.PI * 2);
    ctx.fill();

    // Cabelo (castanho-dourado)
    ctx.fillStyle = '#BFA15A';
    ctx.beginPath();
    ctx.arc(x, y - 27, 5, Math.PI, 0);
    ctx.lineTo(x + 5, y - 23);
    ctx.lineTo(x - 5, y - 23);
    ctx.closePath();
    ctx.fill();

    // Véu (translúcido atrás da cabeça)
    ctx.fillStyle = 'rgba(252,249,242,0.6)';
    ctx.beginPath();
    ctx.moveTo(x - 4, y - 25);
    ctx.lineTo(x - 10, y - 10);
    ctx.lineTo(x + 10, y - 10);
    ctx.lineTo(x + 4, y - 25);
    ctx.closePath();
    ctx.fill();

    // Buquê (mão direita)
    ctx.fillStyle = '#D9A5A5';
    ctx.beginPath();
    ctx.arc(x + 12, y - 8, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#556B2F';
    ctx.beginPath();
    ctx.ellipse(x + 12, y - 5, 1, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Braços
    ctx.fillStyle = '#F5DDC0';
    ctx.fillRect(x - 11, y - 16, 3, 8);
    ctx.fillRect(x + 8, y - 16, 3, 8);
  }

  function desenharNoivo(x, y, frameAnim) {
    const pernaOffset = frameAnim % 2 === 0 ? 0 : 1;

    // Sombra
    ctx.fillStyle = 'rgba(43,43,34,0.2)';
    ctx.beginPath();
    ctx.ellipse(x, CHAO_Y - 2, 12, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pernas (calça escura)
    ctx.fillStyle = '#2B2B22';
    ctx.fillRect(x - 6, y - 14, 5, 14);
    ctx.fillRect(x + 1, y - 14, 5, 14);
    // Sapatos
    ctx.fillStyle = '#1A1A14';
    ctx.fillRect(x - 7, y - 2, 7, 2);
    ctx.fillRect(x, y - 2, 7, 2);

    // Terno (corpo)
    ctx.fillStyle = '#2B2B22';
    ctx.fillRect(x - 9, y - 30, 18, 18);

    // Detalhe do paletó (lapelas em V)
    ctx.fillStyle = '#1A1A14';
    ctx.beginPath();
    ctx.moveTo(x - 9, y - 30);
    ctx.lineTo(x, y - 22);
    ctx.lineTo(x + 9, y - 30);
    ctx.lineTo(x + 4, y - 28);
    ctx.lineTo(x, y - 24);
